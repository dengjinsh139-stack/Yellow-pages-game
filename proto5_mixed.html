<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 音游原型 #5 - 滑条+长按混合</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }
        h1 { margin: 10px 0; font-size: 1.5rem; text-shadow: 0 0 20px #00d2ff; }
        #gameCanvas {
            border: 3px solid #00d2ff;
            border-radius: 10px;
            box-shadow: 
                0 0 30px rgba(0, 210, 255, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.3);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 25px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.6);
        }
        .score {
            margin-top: 10px;
            font-size: 1.1rem;
        }
        .instructions {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <h1>🌊 原型 #5 - 滑条+长按混合</h1>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="score">得分: <span id="score">0</span> | 连击: <span id="combo">0</span></div>
    <div class="controls">
        <button onclick="startGame()">▶ 开始</button>
        <button onclick="resetGame()">↺ 重置</button>
    </div>
    <div class="instructions">
        D/F/J/K 击打单音符 | 按住不放完成长条 | 长条尾端需松开后再次击打
    </div>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#ff6b6b"></div>单音符</div>
        <div class="legend-item"><div class="dot" style="background:#4ecdc4"></div>长条(按住)</div>
        <div class="legend-item"><div class="dot" style="background:#ffe66d"></div>滑条(拖动)</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const LANE_COUNT = 4;
const LANE_WIDTH = canvas.width / LANE_COUNT;
const HIT_LINE_Y = 520;
const BASE_SPEED = 3;

let notes = [];
let score = 0;
let combo = 0;
let gameRunning = false;
let animationId;

const keyMap = { 'KeyD': 0, 'KeyF': 1, 'KeyJ': 2, 'KeyK': 3 };
let heldKeys = new Set();

// 音符类型
const NOTE_TYPES = {
    TAP: 'tap',      // 单击
    HOLD: 'hold',    // 长条
    SLIDE: 'slide'   // 滑条
};

class Note {
    constructor(lane, type = NOTE_TYPES.TAP) {
        this.lane = lane;
        this.type = type;
        this.x = lane * LANE_WIDTH + LANE_WIDTH / 2;
        this.y = -60;
        this.hit = false;
        this.missed = false;
        this.held = false;
        this.completed = false;
        
        if (type === NOTE_TYPES.HOLD) {
            this.length = 120 + Math.random() * 100; // 长条长度
            this.holdProgress = 0;
        } else if (type === NOTE_TYPES.SLIDE) {
            this.waypoints = this.generateWaypoints();
            this.currentWaypoint = 0;
            this.slideProgress = 0;
        }
        
        this.colors = {
            [NOTE_TYPES.TAP]: '#ff6b6b',
            [NOTE_TYPES.HOLD]: '#4ecdc4',
            [NOTE_TYPES.SLIDE]: '#ffe66d'
        };
    }

    generateWaypoints() {
        // 生成滑条的折点
        const points = [{ x: this.x, y: this.y }];
        let currentLane = this.lane;
        let currentY = this.y;
        
        for (let i = 0; i < 2; i++) {
            currentY += 80;
            // 随机左右移动
            const move = Math.floor(Math.random() * 3) - 1; // -1, 0, 1
            currentLane = Math.max(0, Math.min(LANE_COUNT - 1, currentLane + move));
            points.push({ 
                x: currentLane * LANE_WIDTH + LANE_WIDTH / 2, 
                y: currentY,
                lane: currentLane
            });
        }
        return points;
    }

    update() {
        this.y += BASE_SPEED;
        
        if (this.type === NOTE_TYPES.HOLD && this.held) {
            this.holdProgress += BASE_SPEED;
            if (this.holdProgress >= this.length) {
                this.completed = true;
                this.hit = true;
                score += 200;
                combo++;
                showEffect(this.lane, 'HOLD END!', '#4ecdc4');
            }
        }
        
        if (this.type === NOTE_TYPES.SLIDE) {
            this.waypoints.forEach(p => p.y += BASE_SPEED);
        }
        
        // 判定错过
        if (this.y > canvas.height + 50) {
            if (this.type === NOTE_TYPES.HOLD && !this.completed) {
                this.missed = true;
                combo = 0;
            } else if (this.type !== NOTE_TYPES.HOLD) {
                this.missed = true;
                combo = 0;
            }
        }
    }

    draw() {
        if (this.hit && !this.held) return;
        if (this.missed) return;
        
        const color = this.colors[this.type];
        
        if (this.type === NOTE_TYPES.TAP) {
            this.drawTap(color);
        } else if (this.type === NOTE_TYPES.HOLD) {
            this.drawHold(color);
        } else if (this.type === NOTE_TYPES.SLIDE) {
            this.drawSlide(color);
        }
    }

    drawTap(color) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 15;
        
        // 外圈
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 25, 0, Math.PI * 2);
        ctx.stroke();
        
        // 填充
        ctx.fillStyle = color + '80';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 20, 0, Math.PI * 2);
        ctx.fill();
        
        // 中心
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
    }

    drawHold(color) {
        const progress = Math.min(this.holdProgress, this.length);
        const endY = this.y - progress;
        
        // 长条主体
        ctx.fillStyle = color + '60';
        ctx.fillRect(this.x - 20, endY, 40, progress + 30);
        
        // 边框
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x - 20, endY);
        ctx.lineTo(this.x - 20, this.y + 30);
        ctx.moveTo(this.x + 20, endY);
        ctx.lineTo(this.x + 20, this.y + 30);
        ctx.stroke();
        
        // 头部
        ctx.fillStyle = this.held ? '#fff' : color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 22, 0, Math.PI * 2);
        ctx.fill();
        
        // 尾部
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(this.x, endY, 15, 0, Math.PI * 2);
        ctx.fill();
        
        // 进度指示
        if (this.held) {
            const pct = this.holdProgress / this.length;
            ctx.fillStyle = '#fff';
            ctx.fillRect(this.x - 25, this.y - 40, 50 * pct, 6);
        }
    }

    drawSlide(color) {
        // 绘制路径线
        ctx.strokeStyle = color + '60';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(this.waypoints[0].x, this.waypoints[0].y);
        for (let i = 1; i < this.waypoints.length; i++) {
            ctx.lineTo(this.waypoints[i].x, this.waypoints[i].y);
        }
        ctx.stroke();
        
        // 绘制节点
        this.waypoints.forEach((p, i) => {
            ctx.fillStyle = i === 0 ? color : (i === this.waypoints.length - 1 ? '#fff' : color + 'aa');
            ctx.beginPath();
            ctx.arc(p.x, p.y, i === 0 ? 20 : 12, 0, Math.PI * 2);
            ctx.fill();
            
            // 节点序号
            ctx.fillStyle = '#333';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(i + 1, p.x, p.y + 3);
        });
    }
}

function drawLanes() {
    // 背景渐变
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, 'rgba(0,0,0,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 轨道线
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (let i = 1; i < LANE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * LANE_WIDTH, 0);
        ctx.lineTo(i * LANE_WIDTH, canvas.height);
        ctx.stroke();
    }
    
    // 判定线
    ctx.strokeStyle = '#00d2ff';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#00d2ff';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo(0, HIT_LINE_Y);
    ctx.lineTo(canvas.width, HIT_LINE_Y);
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // 判定区域
    ctx.fillStyle = 'rgba(0, 210, 255, 0.1)';
    ctx.fillRect(0, HIT_LINE_Y - 30, canvas.width, 60);
    
    // 按键提示
    ['D', 'F', 'J', 'K'].forEach((key, i) => {
        const pressed = heldKeys.has(i);
        ctx.fillStyle = pressed ? '#00d2ff' : 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(i * LANE_WIDTH + LANE_WIDTH/2, HIT_LINE_Y + 40, 25, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = pressed ? '#000' : '#fff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(key, i * LANE_WIDTH + LANE_WIDTH/2, HIT_LINE_Y + 46);
    });
}

function spawnNote() {
    if (Math.random() < 0.02) {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const rand = Math.random();
        let type = NOTE_TYPES.TAP;
        if (rand > 0.7) type = NOTE_TYPES.HOLD;
        else if (rand > 0.85) type = NOTE_TYPES.SLIDE;
        
        notes.push(new Note(lane, type));
    }
}

function checkHit(lane) {
    const targetNotes = notes.filter(n => !n.hit && !n.missed);
    
    for (let note of targetNotes) {
        if (note.lane !== lane) continue;
        
        const dist = Math.abs(note.y - HIT_LINE_Y);
        
        if (note.type === NOTE_TYPES.TAP && dist <= 30) {
            note.hit = true;
            score += 100;
            combo++;
            showEffect(lane, dist <= 15 ? 'PERFECT!' : 'GOOD', dist <= 15 ? '#ffd700' : '#4ecdc4');
            updateScore();
            return;
        }
        
        if (note.type === NOTE_TYPES.HOLD && dist <= 40 && !note.held) {
            note.held = true;
            heldKeys.add(lane);
            showEffect(lane, 'HOLD!', '#4ecdc4');
            updateScore();
            return;
        }
    }
}

function releaseLane(lane) {
    heldKeys.delete(lane);
    
    notes.forEach(note => {
        if (note.type === NOTE_TYPES.HOLD && note.held && note.lane === lane) {
            if (!note.completed) {
                note.missed = true;
                combo = 0;
            }
            note.held = false;
        }
    });
}

let effects = [];
function showEffect(lane, text, color) {
    effects.push({
        x: lane * LANE_WIDTH + LANE_WIDTH / 2,
        y: HIT_LINE_Y - 50,
        text, color, alpha: 1, scale: 1
    });
}

function updateScore() {
    document.getElementById('score').textContent = score;
    document.getElementById('combo').textContent = combo;
}

function gameLoop() {
    if (!gameRunning) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawLanes();
    
    spawnNote();
    
    notes = notes.filter(n => {
        if (n.type === NOTE_TYPES.HOLD) {
            return !n.hit || n.held;
        }
        return !n.hit && !n.missed;
    });
    
    notes.forEach(note => {
        note.update();
        note.draw();
    });
    
    effects = effects.filter(e => {
        ctx.save();
        ctx.globalAlpha = e.alpha;
        ctx.fillStyle = e.color;
        ctx.font = `bold ${18 * e.scale}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(e.text, e.x, e.y);
        ctx.restore();
        e.alpha -= 0.02;
        e.y -= 1.5;
        e.scale += 0.015;
        return e.alpha > 0;
    });
    
    animationId = requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', (e) => {
    if (!gameRunning) return;
    
    const lane = keyMap[e.code];
    if (lane !== undefined) {
        e.preventDefault();
        checkHit(lane);
    }
});

document.addEventListener('keyup', (e) => {
    const lane = keyMap[e.code];
    if (lane !== undefined) {
        releaseLane(lane);
    }
});

function startGame() {
    if (gameRunning) return;
    gameRunning = true;
    notes = [];
    score = 0;
    combo = 0;
    heldKeys.clear();
    updateScore();
    gameLoop();
}

function resetGame() {
    gameRunning = false;
    cancelAnimationFrame(animationId);
    notes = [];
    score = 0;
    combo = 0;
    heldKeys.clear();
    effects = [];
    updateScore();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawLanes();
}

drawLanes();
</script>
</body>
</html>
