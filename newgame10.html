<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #776e65;
            font-family: Arial, sans-serif;
        }
        .ui {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .score-box {
            background: #bbada0;
            padding: 10px 25px;
            border-radius: 5px;
            color: white;
            text-align: center;
        }
        .score-box span { display: block; font-size: 12px; }
        .grid-container {
            background: #bbada0;
            padding: 10px;
            border-radius: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 10px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            transition: all 0.15s;
        }
        .cell[data-value="2"] { background: #eee4da; color: #776e65; }
        .cell[data-value="4"] { background: #ede0c8; color: #776e65; }
        .cell[data-value="8"] { background: #f2b179; color: white; }
        .cell[data-value="16"] { background: #f59563; color: white; }
        .cell[data-value="32"] { background: #f67c5f; color: white; }
        .cell[data-value="64"] { background: #f65e3b; color: white; }
        .cell[data-value="128"] { background: #edcf72; color: white; }
        .cell[data-value="256"] { background: #edcc61; color: white; }
        .cell[data-value="512"] { background: #edc850; color: white; }
        .cell[data-value="1024"] { background: #edc53f; color: white; }
        .cell[data-value="2048"] { background: #edc22e; color: white; }
        .instructions { margin-top: 20px; color: #8f7a66; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score-box"><span>得分</span><span id="score">0</span></div>
        <div class="score-box"><span>最高分</span><span id="best">0</span></div>
    </div>
    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>
    <p class="instructions">使用方向键移动方块，相同数字会合并！</p>
    
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let grid = Array(4).fill().map(()=>Array(4).fill(0));
        let score = 0;
        let best = localStorage.getItem('best2048') || 0;
        document.getElementById('best').textContent = best;
        
        function playBGM() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 150 + Math.random() * 100;
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
        
        function playMove() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 300;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        
        function playMerge() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
        
        function render() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for(let r = 0; r < 4; r++) {
                for(let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if(grid[r][c] !== 0) {
                        cell.textContent = grid[r][c];
                        cell.dataset.value = grid[r][c];
                    }
                    gridEl.appendChild(cell);
                }
            }
            document.getElementById('score').textContent = score;
        }
        
        function addRandom() {
            const empty = [];
            for(let r = 0; r < 4; r++) {
                for(let c = 0; c < 4; c++) {
                    if(grid[r][c] === 0) empty.push([r, c]);
                }
            }
            if(empty.length > 0) {
                const [r, c] = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }
        
        function move(direction) {
            let moved = false;
            const newGrid = grid.map(row => [...row]);
            
            if(direction === 'left' || direction === 'right') {
                for(let r = 0; r < 4; r++) {
                    let row = newGrid[r].filter(x => x !== 0);
                    if(direction === 'right') row.reverse();
                    
                    for(let i = 0; i < row.length - 1; i++) {
                        if(row[i] === row[i+1]) {
                            row[i] *= 2;
                            score += row[i];
                            row.splice(i+1, 1);
                            playMerge();
                        }
                    }
                    
                    while(row.length < 4) row.push(0);
                    if(direction === 'right') row.reverse();
                    
                    if(row.join(',') !== newGrid[r].join(',')) moved = true;
                    newGrid[r] = row;
                }
            } else {
                for(let c = 0; c < 4; c++) {
                    let col = [];
                    for(let r = 0; r < 4; r++) if(newGrid[r][c] !== 0) col.push(newGrid[r][c]);
                    if(direction === 'down') col.reverse();
                    
                    for(let i = 0; i < col.length - 1; i++) {
                        if(col[i] === col[i+1]) {
                            col[i] *= 2;
                            score += col[i];
                            col.splice(i+1, 1);
                            playMerge();
                        }
                    }
                    
                    while(col.length < 4) col.push(0);
                    if(direction === 'down') col.reverse();
                    
                    for(let r = 0; r < 4; r++) {
                        if(newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }
            
            if(moved) {
                grid = newGrid;
                playMove();
                addRandom();
                render();
                if(score > best) {
                    best = score;
                    localStorage.setItem('best2048', best);
                    document.getElementById('best').textContent = best;
                }
            }
        }
        
        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': move('up'); break;
                case 'ArrowDown': move('down'); break;
                case 'ArrowLeft': move('left'); break;
                case 'ArrowRight': move('right'); break;
            }
        });
        
        addRandom();
        addRandom();
        render();
        setInterval(playBGM, 800);
        
        if(audioCtx.state === 'suspended') {
            document.addEventListener('click', ()=>audioCtx.resume(),{once:true});
        }
    </script>
</body>
</html>
