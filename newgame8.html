<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无限跑酷 - Endless Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Orbitron', 'Courier New', monospace;
            overflow: hidden;
        }
        #gameCanvas {
            border: 3px solid #00d4ff;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
        }
        .ui {
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
        }
        .score {
            font-size: 32px;
            text-shadow: 0 0 20px #00d4ff;
        }
        .stats {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        #startBtn {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        #startBtn:hover {
            transform: scale(1.05);
        }
        .controls {
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="ui">
        <div class="score"><span id="score">0</span> m</div>
        <div class="stats">速度: <span id="speed">1.0</span>x | 最高: <span id="highScore">0</span>m</div>
    </div>
    <canvas id="gameCanvas" width="900" height="400"></canvas>
    <button id="startBtn">开始奔跑</button>
    <div class="controls">SPACE / ↑ 跳跃 | ↓ 滑行 | P 暂停</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const speedEl = document.getElementById('speed');
const highScoreEl = document.getElementById('highScore');
const startBtn = document.getElementById('startBtn');

// 游戏配置
const GROUND_Y = 320;
const GRAVITY = 0.8;
const JUMP_FORCE = -15;

// 游戏状态
let gameRunning = false;
let gamePaused = false;
let score = 0;
let highScore = localStorage.getItem('runnerHighScore') || 0;
let gameSpeed = 6;
let speedMultiplier = 1;

highScoreEl.textContent = highScore;

// 游戏对象
let player;
let obstacles = [];
let coins = [];
let particles = [];
let bgLayers = [];

// ============ Web Audio API - 赛博朋克风格音乐 ============
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgmInterval;

function playTone(frequency, duration, type = 'sawtooth', volume = 0.15) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.type = type;
    osc.frequency.value = frequency;
    filter.type = 'lowpass';
    filter.frequency.value = frequency * 2;
    
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playKick() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function playSnare() {
    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    noise.buffer = buffer;
    noise.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    noise.start();
}

function playHiHat() {
    playTone(8000, 0.05, 'square', 0.08);
}

function playJumpSound() {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(200, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playCoinSound() {
    playTone(1200, 0.1, 'sine', 0.2);
    setTimeout(() => playTone(1600, 0.15, 'sine', 0.15), 50);
}

function playCrashSound() {
    playTone(100, 0.5, 'sawtooth', 0.4);
    setTimeout(() => playTone(50, 0.8, 'sawtooth', 0.4), 200);
}

// BGM序列 - 赛博朋克风格
let beatIndex = 0;
function startBGM() {
    bgmInterval = setInterval(() => {
        if (!gameRunning || gamePaused) return;
        
        const step = beatIndex % 16;
        
        // 鼓组
        if (step % 4 === 0) playKick();
        if (step % 4 === 2) playSnare();
        if (step % 2 === 1) playHiHat();
        
        // 低音
        if (step % 8 === 0) playTone(65, 0.3, 'sawtooth', 0.15);
        if (step % 8 === 4) playTone(98, 0.3, 'sawtooth', 0.15);
        
        // 合成器旋律
        if (step === 0 || step === 6 || step === 10) {
            playTone(440 + Math.random() * 220, 0.1, 'square', 0.1);
        }
        
        beatIndex++;
    }, 125); // 120 BPM
}

function stopBGM() {
    clearInterval(bgmInterval);
    beatIndex = 0;
}

// ============ 游戏类 ============
class Player {
    constructor() {
        this.x = 100;
        this.y = GROUND_Y - 50;
        this.width = 40;
        this.height = 50;
        this.vy = 0;
        this.onGround = true;
        this.isSliding = false;
        this.slideTimer = 0;
        this.runFrame = 0;
    }
    
    jump() {
        if (this.onGround) {
            this.vy = JUMP_FORCE;
            this.onGround = false;
            this.isSliding = false;
            playJumpSound();
            createParticles(this.x + 20, this.y + 50, '#00d4ff', 5);
        }
    }
    
    slide() {
        if (this.onGround && !this.isSliding) {
            this.isSliding = true;
            this.height = 25;
            this.y = GROUND_Y - 25;
            this.slideTimer = 40;
            createParticles(this.x + 20, this.y + 25, '#fff', 3);
        }
    }
    
    update() {
        // 重力
        this.vy += GRAVITY;
        this.y += this.vy;
        
        // 地面检测
        if (this.y >= GROUND_Y - (this.isSliding ? 25 : 50)) {
            this.y = GROUND_Y - (this.isSliding ? 25 : 50);
            this.vy = 0;
            this.onGround = true;
        }
        
        // 滑行计时
        if (this.isSliding) {
            this.slideTimer--;
            if (this.slideTimer <= 0) {
                this.isSliding = false;
                this.height = 50;
                this.y = GROUND_Y - 50;
            }
        }
        
        this.runFrame++;
    }
    
    draw() {
        const bounce = this.onGround ? Math.sin(this.runFrame * 0.3) * 3 : 0;
        const y = this.y + bounce;
        
        // 身体
        ctx.fillStyle = '#00d4ff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00d4ff';
        ctx.fillRect(this.x, y, this.width, this.height);
        ctx.shadowBlur = 0;
        
        // 眼睛
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.x + 25, y + 10, 8, 8);
        ctx.fillStyle = '#000';
        ctx.fillRect(this.x + 28, y + 12, 4, 4);
        
        // 滑行时的拖尾效果
        if (this.isSliding) {
            ctx.fillStyle = 'rgba(0, 212, 255, 0.3)';
            ctx.fillRect(this.x - 10, y, 10, this.height);
            ctx.fillRect(this.x - 20, y + 5, 10, this.height - 10);
        }
    }
}

class Obstacle {
    constructor() {
        this.x = canvas.width + 50;
        this.type = Math.random() > 0.5 ? 'ground' : 'air';
        
        if (this.type === 'ground') {
            // 地面障碍 - 需要跳跃
            this.width = 40;
            this.height = Math.random() > 0.7 ? 60 : 40;
            this.y = GROUND_Y - this.height;
        } else {
            // 空中障碍 - 需要滑行或跳跃
            this.width = 30;
            this.height = 50;
            this.y = GROUND_Y - 110; // 刚好在跳跃最高点
        }
        
        this.passed = false;
    }
    
    update() {
        this.x -= gameSpeed * speedMultiplier;
    }
    
    draw() {
        ctx.fillStyle = '#e94560';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#e94560';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.shadowBlur = 0;
        
        // 危险标记
        ctx.fillStyle = '#000';
        ctx.fillRect(this.x + this.width/2 - 3, this.y + 5, 6, 6);
    }
}

class Coin {
    constructor() {
        this.x = canvas.width + 100 + Math.random() * 200;
        const isHigh = Math.random() > 0.5;
        this.y = isHigh ? GROUND_Y - 120 : GROUND_Y - 60;
        this.radius = 12;
        this.collected = false;
    }
    
    update() {
        this.x -= gameSpeed * speedMultiplier;
    }
    
    draw() {
        if (this.collected) return;
        
        const pulse = Math.sin(Date.now() / 100) * 2;
        
        ctx.fillStyle = '#ffd700';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ffd700';
        ctx.beginPath();
        ctx.arc(this.x, this.y + pulse, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // 内部
        ctx.fillStyle = '#ffed4e';
        ctx.beginPath();
        ctx.arc(this.x - 3, this.y + pulse - 3, this.radius/3, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 1;
        this.color = color;
        this.size = Math.random() * 4 + 2;
    }
    
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.03;
        this.size *= 0.95;
    }
    
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.restore();
    }
}

class BackgroundLayer {
    constructor(speed, color, height) {
        this.speed = speed;
        this.color = color;
        this.height = height;
        this.x = 0;
    }
    
    update() {
        this.x -= gameSpeed * speedMultiplier * this.speed;
        if (this.x <= -canvas.width) this.x = 0;
    }
    
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, canvas.height - this.height, canvas.width, this.height);
        ctx.fillRect(this.x + canvas.width, canvas.height - this.height, canvas.width, this.height);
    }
}

// ============ 游戏逻辑 ============
function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function spawnObstacle() {
    const lastObstacle = obstacles[obstacles.length - 1];
    if (!lastObstacle || canvas.width - lastObstacle.x > 300 + Math.random() * 200) {
        obstacles.push(new Obstacle());
    }
}

function spawnCoin() {
    const lastCoin = coins[coins.length - 1];
    if (!lastCoin || canvas.width - lastCoin.x > 150) {
        if (Math.random() > 0.6) {
            coins.push(new Coin());
        }
    }
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function initGame() {
    player = new Player();
    obstacles = [];
    coins = [];
    particles = [];
    bgLayers = [
        new BackgroundLayer(0.1, '#1a1a2e', 100),
        new BackgroundLayer(0.3, '#242444', 80),
        new BackgroundLayer(0.5, '#363666', 60)
    ];
    score = 0;
    gameSpeed = 6;
    speedMultiplier = 1;
}

function update() {
    if (!gameRunning || gamePaused) return;
    
    // 更新分数和速度
    score += 0.1 * speedMultiplier;
    if (score % 500 < 0.5) {
        speedMultiplier = Math.min(2.5, 1 + score / 2000);
    }
    
    // 更新背景
    bgLayers.forEach(layer => layer.update());
    
    // 更新玩家
    player.update();
    
    // 生成障碍
    spawnObstacle();
    
    // 更新障碍
    obstacles = obstacles.filter(obs => {
        obs.update();
        
        // 碰撞检测
        if (checkCollision(
            {x: player.x + 5, y: player.y + 5, width: player.width - 10, height: player.height - 10},
            obs
        )) {
            gameOver();
        }
        
        return obs.x > -100;
    });
    
    // 金币
    spawnCoin();
    coins = coins.filter(coin => {
        coin.update();
        
        // 收集金币
        const dx = (player.x + player.width/2) - coin.x;
        const dy = (player.y + player.height/2) - coin.y;
        if (Math.sqrt(dx*dx + dy*dy) < coin.radius + 20 && !coin.collected) {
            coin.collected = true;
            score += 50;
            playCoinSound();
            createParticles(coin.x, coin.y, '#ffd700', 8);
        }
        
        return coin.x > -50 && !coin.collected;
    });
    
    // 粒子
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update());
    
    // UI更新
    scoreEl.textContent = Math.floor(score);
    speedEl.textContent = speedMultiplier.toFixed(1);
}

function draw() {
    // 天空渐变
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#0f0c29');
    gradient.addColorStop(0.5, '#302b63');
    gradient.addColorStop(1, '#24243e');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 星星
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 30; i++) {
        const x = ((i * 137 + Date.now() * 0.02) % canvas.width);
        const y = (i * 53) % (canvas.height * 0.6);
        ctx.fillRect(x, y, (i % 2) + 1, (i % 2) + 1);
    }
    
    // 背景层
    bgLayers.forEach(layer => layer.draw());
    
    // 地面
    ctx.fillStyle = '#4a4e69';
    ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    
    // 地面线条
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(canvas.width, GROUND_Y);
    ctx.stroke();
    
    // 游戏对象
    coins.forEach(c => c.draw());
    obstacles.forEach(o => o.draw());
    player.draw();
    particles.forEach(p => p.draw());
    
    // 暂停覆盖
    if (gamePaused) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00d4ff';
        ctx.font = 'bold 30px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;
    stopBGM();
    playCrashSound();
    
    if (score > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem('runnerHighScore', highScore);
        highScoreEl.textContent = highScore;
    }
    
    startBtn.textContent = '重新开始';
    
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CRASHED!', canvas.width/2, canvas.height/2 - 30);
    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    ctx.fillText(`距离: ${Math.floor(score)}m`, canvas.width/2, canvas.height/2 + 20);
    ctx.fillText(`最高: ${highScore}m`, canvas.width/2, canvas.height/2 + 50);
}

function startGame() {
    initGame();
    gameRunning = true;
    gamePaused = false;
    startBGM();
    startBtn.textContent = '游戏中...';
}

// 控制
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        if (gameRunning && !gamePaused) {
            player.jump();
        } else if (!gameRunning) {
            startGame();
        }
        e.preventDefault();
    }
    if (e.code === 'ArrowDown') {
        if (gameRunning && !gamePaused) {
            player.slide();
        }
        e.preventDefault();
    }
    if ((e.key === 'p' || e.key === 'P') && gameRunning) {
        gamePaused = !gamePaused;
    }
});

startBtn.addEventListener('click', startGame);

// 初始化
initGame();
draw();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
