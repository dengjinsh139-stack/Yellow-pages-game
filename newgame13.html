<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接水果游戏 - 欢乐篮子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        h1 {
            color: #228B22;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }
        .score-item {
            background: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        .score-item span {
            color: #ff6b6b;
        }
        canvas {
            border: 4px solid #8B4513;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 100%);
        }
        .controls {
            margin-top: 15px;
        }
        button {
            background: #ff6b6b;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        .music-btn {
            background: #4ecdc4;
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            border: 4px solid #ff6b6b;
            display: none;
            z-index: 100;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .combo-display {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .combo-display.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍎 接水果大作战 🍎</h1>
        <div class="score-board">
            <div class="score-item">得分: <span id="score">0</span></div>
            <div class="score-item">生命: <span id="lives">❤️❤️❤️</span></div>
            <div class="score-item">最高分: <span id="highScore">0</span></div>
        </div>
        <div class="combo-display" id="comboDisplay">连击 x2!</div>
        <canvas id="gameCanvas" width="500" height="600"></canvas>
        <div class="controls">
            <p>🖱️ 鼠标/触摸移动篮子 | 接住水果，避开炸弹!</p>
            <button onclick="startGame()">开始游戏</button>
            <button class="music-btn" onclick="toggleMusic()">🎵 音乐</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎮 游戏结束!</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>最高连击: <span id="maxCombo">0</span></p>
        <button onclick="restartGame()">再玩一次</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let lives = 3;
        let highScore = localStorage.getItem('fruitHighScore') || 0;
        let gameRunning = false;
        let musicEnabled = true;
        let combo = 0;
        let maxCombo = 0;
        let comboTimer = 0;
        
        document.getElementById('highScore').textContent = highScore;
        
        // Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBackgroundMusic() {
            if (!musicEnabled) return;
            
            const playNote = (freq, duration, delay, type = 'sine') => {
                setTimeout(() => {
                    if (!musicEnabled || !gameRunning) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                }, delay);
            };
            
            // 欢快的背景音乐
            const melody = () => {
                if (!gameRunning || !musicEnabled) return;
                const notes = [262, 294, 330, 349, 392, 349, 330, 294];
                notes.forEach((freq, i) => playNote(freq, 0.4, i * 300));
                setTimeout(melody, 2500);
            };
            
            const harmony = () => {
                if (!gameRunning || !musicEnabled) return;
                playNote(131, 1.2, 0, 'triangle');
                setTimeout(harmony, 2000);
            };
            
            melody();
            harmony();
        }
        
        function playCatchSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 523 + Math.random() * 200;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
        
        function playBombSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
        
        function playComboSound() {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                }, i * 50);
            });
        }
        
        // 游戏对象
        const basket = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 80,
            width: 80,
            height: 40,
            tilt: 0
        };
        
        const fruits = [];
        const particles = [];
        const clouds = [];
        
        const fruitTypes = [
            { emoji: '🍎', score: 10, color: '#ff6b6b', weight: 30 },
            { emoji: '🍊', score: 15, color: '#ffa500', weight: 25 },
            { emoji: '🍇', score: 20, color: '#9b59b6', weight: 20 },
            { emoji: '🍌', score: 25, color: '#f1c40f', weight: 15 },
            { emoji: '🍉', score: 30, color: '#ff69b4', weight: 8 },
            { emoji: '🍓', score: 50, color: '#ff1493', weight: 2 }
        ];
        
        // 初始化云朵
        function initClouds() {
            clouds.length = 0;
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * 150,
                    size: 30 + Math.random() * 40,
                    speed: 0.2 + Math.random() * 0.3
                });
            }
        }
        
        function spawnFruit() {
            const isBomb = Math.random() < 0.15; // 15%概率炸弹
            
            if (isBomb) {
                fruits.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    emoji: '💣',
                    isBomb: true,
                    speed: 2 + Math.random() * 2 + score / 500,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            } else {
                // 根据权重选择水果
                let random = Math.random() * 100;
                let selected = fruitTypes[0];
                let cumulative = 0;
                
                for (let type of fruitTypes) {
                    cumulative += type.weight;
                    if (random <= cumulative) {
                        selected = type;
                        break;
                    }
                }
                
                fruits.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    emoji: selected.emoji,
                    score: selected.score,
                    color: selected.color,
                    isBomb: false,
                    speed: 2 + Math.random() * 2 + score / 500,
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.05
                });
            }
        }
        
        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    dx: (Math.random() - 0.5) * 6,
                    dy: (Math.random() - 0.5) * 6 - 2,
                    life: 1,
                    color: color,
                    size: 4 + Math.random() * 4
                });
            }
        }
        
        // 鼠标/触摸控制
        function updateBasketPosition(clientX) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            basket.x = x - basket.width / 2;
            
            // 限制范围
            if (basket.x < 0) basket.x = 0;
            if (basket.x + basket.width > canvas.width) {
                basket.x = canvas.width - basket.width;
            }
        }
        
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) updateBasketPosition(e.clientX);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) updateBasketPosition(e.touches[0].clientX);
        });
        
        function updateFruits() {
            for (let i = fruits.length - 1; i >= 0; i--) {
                const f = fruits[i];
                f.y += f.speed;
                f.rotation += f.rotSpeed;
                
                // 检查接住
                if (f.y + 20 > basket.y && f.y < basket.y + basket.height &&
                    f.x > basket.x - 10 && f.x < basket.x + basket.width + 10) {
                    
                    if (f.isBomb) {
                        // 炸弹
                        playBombSound();
                        createParticles(f.x, f.y, '#333', 15);
                        lives--;
                        combo = 0;
                        updateLivesDisplay();
                        
                        if (lives <= 0) {
                            gameOver();
                            return;
                        }
                    } else {
                        // 水果
                        playCatchSound();
                        createParticles(f.x, f.y, f.color, 10);
                        
                        // 连击系统
                        combo++;
                        comboTimer = 60;
                        if (combo > maxCombo) maxCombo = combo;
                        
                        let bonus = 1;
                        if (combo >= 5) {
                            bonus = 2;
                            showCombo();
                            playComboSound();
                        }
                        if (combo >= 10) bonus = 3;
                        
                        score += f.score * bonus;
                        document.getElementById('score').textContent = score;
                        
                        // 篮子倾斜动画
                        basket.tilt = f.x < basket.x + basket.width / 2 ? -0.2 : 0.2;
                    }
                    
                    fruits.splice(i, 1);
                    continue;
                }
                
                // 掉落检测
                if (f.y > canvas.height) {
                    if (!f.isBomb) {
                        combo = 0;
                    }
                    fruits.splice(i, 1);
                }
            }
        }
        
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.dx;
                p.y += p.dy;
                p.dy += 0.15;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        function updateClouds() {
            clouds.forEach(c => {
                c.x += c.speed;
                if (c.x > canvas.width + c.size) {
                    c.x = -c.size;
                    c.y = Math.random() * 150;
                }
            });
        }
        
        function showCombo() {
            const display = document.getElementById('comboDisplay');
            display.textContent = `连击 x${combo}!`;
            display.classList.add('show');
            setTimeout(() => display.classList.remove('show'), 1500);
        }
        
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            document.getElementById('lives').textContent = hearts;
        }
        
        function drawBasket() {
            ctx.save();
            ctx.translate(basket.x + basket.width / 2, basket.y + basket.height / 2);
            ctx.rotate(basket.tilt);
            
            // 篮子阴影
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(-basket.width/2 + 5, 5, basket.width, basket.height);
            
            // 篮子主体
            const gradient = ctx.createLinearGradient(0, -basket.height/2, 0, basket.height/2);
            gradient.addColorStop(0, '#D2691E');
            gradient.addColorStop(0.5, '#8B4513');
            gradient.addColorStop(1, '#654321');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(-basket.width/2, -basket.height/2);
            ctx.lineTo(basket.width/2, -basket.height/2);
            ctx.lineTo(basket.width/2 - 10, basket.height/2);
            ctx.lineTo(-basket.width/2 + 10, basket.height/2);
            ctx.closePath();
            ctx.fill();
            
            // 篮子纹理
            ctx.strokeStyle = '#5D3A1A';
            ctx.lineWidth = 2;
            for (let i = -basket.width/2 + 10; i < basket.width/2 - 10; i += 15) {
                ctx.beginPath();
                ctx.moveTo(i, -basket.height/2 + 5);
                ctx.lineTo(i, basket.height/2 - 5);
                ctx.stroke();
            }
            
            ctx.restore();
            
            // 恢复倾斜
            basket.tilt *= 0.9;
        }
        
        function drawFruits() {
            fruits.forEach(f => {
                ctx.save();
                ctx.translate(f.x, f.y);
                ctx.rotate(f.rotation);
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji, 0, 0);
                ctx.restore();
                
                // 阴影
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(f.x + 5, f.y + 15, 12, 5, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }
        
        function drawClouds() {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                ctx.arc(c.x + c.size * 0.5, c.y - c.size * 0.3, c.size * 0.8, 0, Math.PI * 2);
                ctx.arc(c.x - c.size * 0.5, c.y - c.size * 0.2, c.size * 0.7, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        let spawnCounter = 0;
        
        function gameLoop() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景渐变
            const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGradient.addColorStop(0, '#87CEEB');
            bgGradient.addColorStop(0.5, '#E0F6FF');
            bgGradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawClouds();
            
            // 生成水果
            spawnCounter++;
            if (spawnCounter > Math.max(30, 60 - score / 100)) {
                spawnFruit();
                spawnCounter = 0;
            }
            
            updateFruits();
            updateParticles();
            updateClouds();
            
            // 连击计时
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) combo = 0;
            }
            
            drawFruits();
            drawParticles();
            drawBasket();
            
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            if (gameRunning) return;
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            gameRunning = true;
            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            fruits.length = 0;
            particles.length = 0;
            spawnCounter = 0;
            
            document.getElementById('score').textContent = score;
            updateLivesDisplay();
            document.getElementById('gameOver').style.display = 'none';
            
            initClouds();
            playBackgroundMusic();
            gameLoop();
        }
        
        function gameOver() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('fruitHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
        }
        
        // 初始绘制
        initClouds();
        drawClouds();
        drawBasket();
    </script>
</body>
</html>
