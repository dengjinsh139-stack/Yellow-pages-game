<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎸 来组乐队吧 v2.4 | 多音轨版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            pointer-events: none;
            z-index: 1000;
        }
        
        .title {
            font-size: 1.2rem;
            color: #ff0066;
            text-shadow: 4px 4px 0 #660033, -2px -2px 0 #ffcc00;
            margin: 20px 0 15px;
            text-align: center;
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 2px); }
            94% { transform: translate(2px, -2px); }
        }
        
        .screen {
            width: 900px;
            max-width: 95vw;
            height: 650px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(255,0,102,0.2);
            position: relative;
            display: none;
        }
        
        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .subtitle {
            font-size: 0.7rem;
            color: #00ff99;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0,255,153,0.5);
        }
        
        .instrument-select {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .instrument-card {
            width: 180px;
            height: 220px;
            background: linear-gradient(145deg, #2a2a4e, #1a1a3e);
            border: 4px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .instrument-card:hover {
            border-color: #ff0066;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,0,102,0.5);
        }
        
        .instrument-icon { font-size: 3.5rem; margin-bottom: 15px; }
        .instrument-name { font-size: 0.7rem; color: #fff; margin-bottom: 8px; }
        .instrument-desc { font-size: 0.45rem; color: #888; text-align: center; line-height: 1.8; }
        .instrument-keys {
            font-size: 0.4rem;
            color: #00ff99;
            margin-top: 10px;
            padding: 5px 10px;
            background: rgba(0,255,153,0.1);
            border: 1px solid #00ff99;
        }
        
        #gameCanvas {
            background: #0a0a1a;
            border: 2px solid #333;
        }
        
        .hud {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
        }
        
        .hud-item { display: flex; flex-direction: column; gap: 5px; }
        .hud-label { color: #888; font-size: 0.45rem; }
        .hud-value { color: #ffcc00; font-size: 0.9rem; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        
        .energy-container {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: #1a1a3e;
            border: 3px solid #444;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .energy-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff0066, #ffcc00, #00ff99);
            transition: width 0.1s ease-out;
            box-shadow: 0 0 20px currentColor;
        }
        
        .energy-label {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            color: #ffcc00;
            text-shadow: 0 0 5px rgba(255,204,0,0.5);
        }
        
        .rock-mode-text {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #ff0066;
            text-shadow: 0 0 20px #ff0066;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .rock-mode-text.active { opacity: 1; animation: rockPulse 0.5s ease-in-out infinite; }
        
        @keyframes rockPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
        
        .judgment {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 30px currentColor;
            animation: judgmentAnim 0.4s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes judgmentAnim {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            30% { transform: scale(1.3) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; }
        }
        
        .judgment.perfect { color: #ffcc00; }
        .judgment.good { color: #00ff99; }
        .judgment.miss { color: #ff3333; }
        
        .btn {
            padding: 15px 40px;
            background: linear-gradient(145deg, #ff0066, #cc0052);
            border: 4px solid #fff;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.1s;
            margin-top: 30px;
        }
        
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,0,102,0.6); }
        .btn:active { transform: scale(0.95); }
        
        .result-title { font-size: 1.5rem; color: #ffcc00; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,204,0,0.5); }
        .result-score { font-size: 3.5rem; color: #fff; margin: 20px 0; text-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .result-rank { font-size: 5rem; margin: 20px 0; text-shadow: 0 0 40px currentColor; }
        
        .result-stats {
            display: flex;
            gap: 40px;
            margin: 30px 0;
            font-size: 0.6rem;
        }
        
        .stat-item { text-align: center; padding: 15px 20px; background: rgba(255,255,255,0.05); border: 2px solid #333; }
        .stat-value { font-size: 1.5rem; margin-bottom: 10px; }
        
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 10px 20px;
            background: #333;
            border: 3px solid #555;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .back-btn:hover { background: #ff0066; border-color: #ff0066; }
        
        .combo-display {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .combo-display.active { opacity: 1; }
        .combo-number { font-size: 3rem; color: #ffcc00; text-shadow: 0 0 20px rgba(255,204,0,0.8); }
        .combo-text { font-size: 0.6rem; color: #fff; }
        
        .rock-mode-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255,0,102,0.2) 0%, transparent 70%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 999;
        }
        
        .rock-mode-overlay.active { opacity: 1; animation: rockFlash 0.2s ease-in-out infinite; }
        
        @keyframes rockFlash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        .track-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            font-size: 0.4rem;
        }
        
        .track-item {
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            color: #888;
        }
        
        .track-item.active {
            background: rgba(0,255,153,0.3);
            border-color: #00ff99;
            color: #00ff99;
        }
        
        .track-item.player {
            background: rgba(255,0,102,0.3);
            border-color: #ff0066;
            color: #ff0066;
            animation: playerPulse 1s ease-in-out infinite;
        }
        
        @keyframes playerPulse {
            0%, 100% { box-shadow: 0 0 5px #ff0066; }
            50% { box-shadow: 0 0 15px #ff0066; }
        }
    </style>
</head>
<body>
    <h1 class="title">🎸 来组乐队吧 v2.4</h1>
    
    <div class="rock-mode-overlay" id="rockOverlay"></div>
    
    <div id="instrumentScreen" class="screen active">
        <p class="subtitle">▼ 选择你要演奏的乐器 ▼</p>
        <p style="font-size: 0.5rem; color: #666; margin-bottom: 20px;">其他3种乐器会自动伴奏</p>
        
        <div class="instrument-select">
            <div class="instrument-card" onclick="selectInstrument('drum')">
                <div class="instrument-icon">🥁</div>
                <div class="instrument-name">鼓手</div>
                <div class="instrument-desc">动次打次<br>底鼓+军鼓+踩镲</div>
                <div class="instrument-keys">D F J K</div>
            </div>
            
            <div class="instrument-card" onclick="selectInstrument('guitar')">
                <div class="instrument-icon">🎸</div>
                <div class="instrument-name">吉他</div>
                <div class="instrument-desc">扫弦+分解和弦<br>强拍低音/弱拍高音</div>
                <div class="instrument-keys">D J</div>
            </div>
            
            <div class="instrument-card" onclick="selectInstrument('bass')">
                <div class="instrument-icon">🎸</div>
                <div class="instrument-name">贝斯</div>
                <div class="instrument-desc">根音+行走低音<br>Walking Bass Line</div>
                <div class="instrument-keys">D J</div>
            </div>
            
            <div class="instrument-card" onclick="selectInstrument('keyboard')">
                <div class="instrument-icon">🎹</div>
                <div class="instrument-name">键盘</div>
                <div class="instrument-desc">分解和弦琶音<br>柱式和弦伴奏</div>
                <div class="instrument-keys">D F J K</div>
            </div>
        </div>
    </div>
    
    <div id="gameScreen" class="screen">
        <button class="back-btn" onclick="backToMenu()">← 退出</button>
        
        <div class="hud">
            <div class="hud-item">
                <div class="hud-label">SCORE</div>
                <div class="hud-value" id="scoreDisplay">000000</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">MAX COMBO</div>
                <div class="hud-value" id="maxComboDisplay">0</div>
            </div>
        </div>
        
        <div class="energy-container">
            <div class="energy-label">BAND ENERGY</div>
            <div class="energy-bar" id="energyBar"></div>
        </div>
        
        <div class="rock-mode-text" id="rockModeText">🤘 ROCK MODE! 🤘</div>
        
        <div class="combo-display" id="comboDisplay">
            <div class="combo-number" id="comboNumber">0</div>
            <div class="combo-text">COMBO!</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="520"></canvas>
        
        <div class="track-indicator">
            <div class="track-item" id="track-drum">🥁 鼓</div>
            <div class="track-item" id="track-guitar">🎸 吉他</div>
            <div class="track-item" id="track-bass">🎸 贝斯</div>
            <div class="track-item" id="track-keyboard">🎹 键盘</div>
        </div>
    </div>
    
    <div id="resultScreen" class="screen">
        <div class="result-title">演出结束!</div>
        <div class="result-score" id="finalScore">0</div>
        <div class="result-rank" id="finalRank">S</div>
        
        <div class="result-stats">
            <div class="stat-item">
                <div class="stat-value" id="perfectCount" style="color: #ffcc00;">0</div>
                <div>PERFECT</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="goodCount" style="color: #00ff99;">0</div>
                <div>GOOD</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="missCount" style="color: #ff3333;">0</div>
                <div>MISS</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="finalMaxCombo" style="color: #66ccff;">0</div>
                <div>MAX COMBO</div>
            </div>
        </div>
        
        <button class="btn" onclick="backToMenu()">再来一次</button>
    </div>

<script>
// 游戏状态
let gameState = {
    instrument: null,
    score: 0,
    combo: 0,
    maxCombo: 0,
    perfectCount: 0,
    goodCount: 0,
    missCount: 0,
    bandEnergy: 0,
    isRockMode: false,
    isPlaying: false,
    notes: [],
    gameStartTime: 0,
    laneCount: 4,
    bpm: 90
};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// 和弦进行
const chordProgression = [
    { chord: 'C', root: 261.63, notes: [261.63, 329.63, 392.00] },
    { chord: 'Am', root: 220.00, notes: [220.00, 261.63, 329.63] },
    { chord: 'F', root: 349.23, notes: [349.23, 440.00, 261.63] },
    { chord: 'G', root: 392.00, notes: [392.00, 293.66, 349.23] }
];

// 音轨系统
const tracks = { drum: [], guitar: [], bass: [], keyboard: [] };

// 鼓声音
function playDrumSound(type) {
    const t = audioCtx.currentTime;
    if (type === 'kick') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.1);
        gain.gain.setValueAtTime(0.8, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
        osc.start(t);
        osc.stop(t + 0.3);
    } else if (type === 'snare') {
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 1000;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start(t);
        noise.stop(t + 0.2);
    } else if (type === 'hihat') {
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) output[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = 8000;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start(t);
        noise.stop(t + 0.05);
    }
}

// 其他乐器声音
function playGuitarSound(note) {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = note;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2500;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.4);
}

function playBassSound(note) {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = note / 2;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 500;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.5);
}

function playKeyboardSound(note) {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = note;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.6);
}

// 生成音轨
function generateTracks(playerInstrument) {
    const duration = 20000;
    const beatInterval = 60000 / gameState.bpm;
    const totalBeats = Math.floor(duration / beatInterval);
    
    tracks.drum = [];
    tracks.guitar = [];
    tracks.bass = [];
    tracks.keyboard = [];
    
    for (let beat = 0; beat < totalBeats; beat++) {
        const time = beat * beatInterval + 2000;
        const beatInBar = beat % 4;
        const chord = chordProgression[Math.floor(beat / 4) % chordProgression.length];
        
        // 鼓音轨 - 动次打次
        if (playerInstrument !== 'drum') {
            tracks.drum.push({ time, sound: 'hihat' });
            if (beatInBar === 0 || beatInBar === 2) tracks.drum.push({ time, sound: 'kick' });
            if (beatInBar === 1 || beatInBar === 3) tracks.drum.push({ time: time + 10, sound: 'snare' });
        }
        
        // 吉他音轨 - 扫弦
        if (playerInstrument !== 'guitar') {
            tracks.guitar.push({ time, note: chord.notes[0] });
            if (beat % 2 === 1) tracks.guitar.push({ time: time + 100, note: chord.notes[1] });
        }
        
        // 贝斯音轨 - 根音
        if (playerInstrument !== 'bass') {
            if (beatInBar === 0) tracks.bass.push({ time, note: chord.root });
            else if (beatInBar === 2) tracks.bass.push({ time, note: chord.notes[2] });
        }
        
        // 键盘音轨 - 分解和弦
        if (playerInstrument !== 'keyboard') {
            if (beatInBar === 0) {
                tracks.keyboard.push({ time, note: chord.notes[0] });
                tracks.keyboard.push({ time: time + 150, note: chord.notes[1] });
            }
        }
    }
}

// 屏幕切换
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function selectInstrument(inst) {
    gameState.instrument = inst;
    gameState.laneCount = (inst === 'drum' || inst === 'keyboard') ? 4 : 2;
    
    document.querySelectorAll('.track-item').forEach(el => {
        el.classList.remove('active', 'player');
    });
    
    ['drum', 'guitar', 'bass', 'keyboard'].forEach(key => {
        const el = document.getElementById(`track-${key}`);
        if (key === inst) {
            el.classList.add('player');
        } else {
            el.classList.add('active');
        }
    });
    
    startCountdown();
}

function backToMenu() {
    gameState.isPlaying = false;
    document.getElementById('rockOverlay').classList.remove('active');
    showScreen('instrumentScreen');
}

// 倒计时
function startCountdown() {
    showScreen('gameScreen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const countSound = (freq) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    };
    
    let count = 3;
    const doCount = () => {
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 120px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        if (count > 0) {
            ctx.fillStyle = '#ffcc00';
            ctx.shadowColor = '#ffcc00';
            ctx.shadowBlur = 30;
            ctx.fillText(count, canvas.width/2, canvas.height/2);
            ctx.shadowBlur = 0;
            countSound(440 + (4-count) * 110);
            count--;
            setTimeout(doCount, 1000);
        } else {
            ctx.fillStyle = '#00ff99';
            ctx.shadowColor = '#00ff99';
            ctx.shadowBlur = 30;
            ctx.fillText('GO!', canvas.width/2, canvas.height/2);
            ctx.shadowBlur = 0;
            countSound(880);
            setTimeout(startGame, 500);
        }
    };
    
    doCount();
}

// 生成玩家谱面 - 降低难度
function generatePlayerNotes() {
    const notes = [];
    const duration = 20000;
    const beatInterval = 60000 / gameState.bpm;
    const totalBeats = Math.floor(duration / beatInterval);
    const inst = gameState.instrument;
    
    for (let beat = 0; beat < totalBeats; beat++) {
        const time = beat * beatInterval + 2000;
        const beatInBar = beat % 4;
        
        if (inst === 'drum') {
            // 鼓：每2拍一个音符，降低密度
            if (beat % 2 === 0) {
                notes.push({ time, lane: beatInBar < 2 ? 0 : 2, hit: false });
            }
        } else if (inst === 'guitar') {
            // 吉他：强拍低音，弱拍高音
            if (beatInBar === 0 || beatInBar === 2) {
                notes.push({ time, lane: 0, hit: false });
            } else if (beatInBar === 1) {
                notes.push({ time, lane: 1, hit: false });
            }
        } else if (inst === 'bass') {
            // 贝斯：每2拍一个根音
            if (beat % 2 === 0) {
                notes.push({ time, lane: 0, hit: false });
            }
        } else if (inst === 'keyboard') {
            // 键盘：每小节2个琶音
            if (beatInBar === 0) {
                notes.push({ time, lane: 0, hit: false });
                notes.push({ time: time + 200, lane: 1, hit: false });
            } else if (beatInBar === 2) {
                notes.push({ time, lane: 2, hit: false });
            }
        }
    }
    
    return notes;
}

let gameLoop = null;
let lastBeat = -1;

function startGame() {
    gameState.score = 0;
    gameState.combo = 0;
    gameState.maxCombo = 0;
    gameState.perfectCount = 0;
    gameState.goodCount = 0;
    gameState.missCount = 0;
    gameState.bandEnergy = 0;
    gameState.isRockMode = false;
    gameState.isPlaying = true;
    gameState.notes = generatePlayerNotes();
    gameState.gameStartTime = Date.now();
    lastBeat = -1;
    
    generateTracks(gameState.instrument);
    
    document.getElementById('rockModeText').classList.remove('active');
    document.getElementById('rockOverlay').classList.remove('active');
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const laneCount = gameState.laneCount;
    const laneWidth = canvas.width / laneCount;
    const hitLineY = 420;
    const noteSpeed = 200;
    
    updateHUD();
    
    const keyMap = laneCount === 4 
        ? {'KeyD': 0, 'KeyF': 1, 'KeyJ': 2, 'KeyK': 3}
        : {'KeyD': 0, 'KeyK': 1};
    
    const keyHandler = (e) => {
        if (!gameState.isPlaying) return;
        const lane = keyMap[e.code];
        if (lane === undefined) return;
        e.preventDefault();
        
        const currentTime = Date.now() - gameState.gameStartTime;
        
        // 播放对应乐器声音
        if (gameState.instrument === 'drum') {
            const sounds = ['kick', 'hihat', 'snare', 'hihat'];
            playDrumSound(sounds[lane] || 'kick');
        } else {
            const chord = chordProgression[Math.floor((currentTime / 1000) / (240 / gameState.bpm)) % 4];
            const note = chord.notes[lane % chord.notes.length];
            if (gameState.instrument === 'guitar') playGuitarSound(note);
            else if (gameState.instrument === 'bass') playBassSound(note);
            else if (gameState.instrument === 'keyboard') playKeyboardSound(note);
        }
        
        let nearestNote = null;
        let minTimeDiff = Infinity;
        
        gameState.notes.forEach(note => {
            if (note.hit || note.lane !== lane) return;
            const timeDiff = Math.abs(note.time - currentTime);
            if (timeDiff < minTimeDiff && timeDiff < 250) {
                minTimeDiff = timeDiff;
                nearestNote = note;
            }
        });
        
        if (nearestNote) {
            const x = nearestNote.lane * laneWidth + laneWidth / 2;
            if (minTimeDiff <= 100) {
                nearestNote.hit = true;
                gameState.combo++;
                gameState.perfectCount++;
                gameState.score += 100 * (gameState.isRockMode ? 2 : 1);
                addEnergy(10);
                showJudgment('PERFECT', x, hitLineY);
            } else if (minTimeDiff <= 180) {
                nearestNote.hit = true;
                gameState.combo++;
                gameState.goodCount++;
                gameState.score += 50 * (gameState.isRockMode ? 2 : 1);
                addEnergy(5);
                showJudgment('GOOD', x, hitLineY);
            }
            if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
            updateHUD();
        }
    };
    
    document.addEventListener('keydown', keyHandler);
    window.gameKeyHandler = keyHandler;
    
    gameLoop = setInterval(() => {
        if (!gameState.isPlaying) {
            clearInterval(gameLoop);
            return;
        }
        
        const currentTime = Date.now() - gameState.gameStartTime;
        const currentBeat = Math.floor(currentTime / (60000 / gameState.bpm));
        
        // 播放伴奏音轨
        if (currentBeat !== lastBeat) {
            lastBeat = currentBeat;
            
            tracks.drum.forEach(evt => {
                if (Math.abs(evt.time - currentTime) < 50) playDrumSound(evt.sound);
            });
            tracks.guitar.forEach(evt => {
                if (Math.abs(evt.time - currentTime) < 50) playGuitarSound(evt.note);
            });
            tracks.bass.forEach(evt => {
                if (Math.abs(evt.time - currentTime) < 50) playBassSound(evt.note);
            });
            tracks.keyboard.forEach(evt => {
                if (Math.abs(evt.time - currentTime) < 50) playKeyboardSound(evt.note);
            });
        }
        
        // 绘制
        ctx.fillStyle = gameState.isRockMode ? '#1a0510' : '#0a0a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if (gameState.isRockMode && Math.floor(currentTime / 100) % 2 === 0) {
            ctx.fillStyle = 'rgba(255, 0, 102, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        ctx.strokeStyle = gameState.isRockMode ? '#ff0066' : '#333';
        ctx.lineWidth = 2;
        for (let i = 1; i < laneCount; i++) {
            ctx.beginPath();
            ctx.moveTo(i * laneWidth, 0);
            ctx.lineTo(i * laneWidth, canvas.height);
            ctx.stroke();
        }
        
        ctx.strokeStyle = gameState.isRockMode ? '#ffcc00' : '#ff0066';
        ctx.lineWidth = 4;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(0, hitLineY);
        ctx.lineTo(canvas.width, hitLineY);
        ctx.stroke();
        ctx.shadowBlur = 0;
        
        ctx.font = '16px "Press Start 2P"';
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        const keyLabels = laneCount === 4 ? ['D', 'F', 'J', 'K'] : ['D', 'K'];
        keyLabels.forEach((key, i) => {
            ctx.fillText(key, i * laneWidth + laneWidth / 2, hitLineY + 30);
        });
        
        // 绘制音符
        gameState.notes.forEach(note => {
            if (note.hit) return;
            
            const timeDiff = note.time - currentTime;
            const y = hitLineY - (timeDiff / 1000) * noteSpeed;
            
            if (y > -50 && y < canvas.height + 50) {
                const x = note.lane * laneWidth + laneWidth / 2;
                ctx.shadowColor = gameState.isRockMode ? '#ffcc00' : '#00ff99';
                ctx.shadowBlur = 15;
                ctx.fillStyle = gameState.isRockMode ? '#ffcc00' : '#00ff99';
                const w = laneWidth * 0.7;
                ctx.fillRect(x - w/2, y - 10, w, 20);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(x - w/2 + 4, y - 6, w - 8, 4);
                ctx.shadowBlur = 0;
            }
            
            if (y > canvas.height + 30) {
                note.hit = true;
                gameState.combo = 0;
                gameState.missCount++;
                addEnergy(-10);
                showJudgment('MISS', note.lane * laneWidth + laneWidth / 2, hitLineY);
                updateHUD();
            }
        });
        
        if (currentTime > 23000) endGame();
    }, 1000/60);
}

function addEnergy(amount) {
    gameState.bandEnergy = Math.max(0, Math.min(100, gameState.bandEnergy + amount));
    document.getElementById('energyBar').style.width = gameState.bandEnergy + '%';
    
    if (gameState.bandEnergy >= 80 && !gameState.isRockMode) {
        gameState.isRockMode = true;
        document.getElementById('rockModeText').classList.add('active');
        document.getElementById('rockOverlay').classList.add('active');
    } else if (gameState.bandEnergy < 50 && gameState.isRockMode) {
        gameState.isRockMode = false;
        document.getElementById('rockModeText').classList.remove('active');
        document.getElementById('rockOverlay').classList.remove('active');
    }
}

function showJudgment(text, x, y) {
    const el = document.createElement('div');
    el.className = `judgment ${text.toLowerCase()}`;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = (y - 50) + 'px';
    document.getElementById('gameScreen').appendChild(el);
    setTimeout(() => el.remove(), 400);
}

function updateHUD() {
    document.getElementById('scoreDisplay').textContent = Math.floor(gameState.score).toString().padStart(6, '0');
    document.getElementById('maxComboDisplay').textContent = gameState.maxCombo;
    
    const comboDisplay = document.getElementById('comboDisplay');
    if (gameState.combo >= 5) {
        comboDisplay.classList.add('active');
        document.getElementById('comboNumber').textContent = gameState.combo;
    } else {
        comboDisplay.classList.remove('active');
    }
}

function endGame() {
    gameState.isPlaying = false;
    clearInterval(gameLoop);
    if (window.gameKeyHandler) document.removeEventListener('keydown', window.gameKeyHandler);
    document.getElementById('rockOverlay').classList.remove('active');
    
    const total = gameState.perfectCount + gameState.goodCount + gameState.missCount;
    const accuracy = total > 0 ? ((gameState.perfectCount + gameState.goodCount * 0.5) / total * 100) : 0;
    
    let rank = 'C';
    let rankColor = '#ff6666';
    if (accuracy >= 95) { rank = 'S'; rankColor = '#ffcc00'; }
    else if (accuracy >= 85) { rank = 'A'; rankColor = '#00ff99'; }
    else if (accuracy >= 70) { rank = 'B'; rankColor = '#66ccff'; }
    
    document.getElementById('finalScore').textContent = Math.floor(gameState.score);
    document.getElementById('finalRank').textContent = rank;
    document.getElementById('finalRank').style.color = rankColor;
    document.getElementById('perfectCount').textContent = gameState.perfectCount;
    document.getElementById('goodCount').textContent = gameState.goodCount;
    document.getElementById('missCount').textContent = gameState.missCount;
    document.getElementById('finalMaxCombo').textContent = gameState.maxCombo;
    
    showScreen('resultScreen');
}
