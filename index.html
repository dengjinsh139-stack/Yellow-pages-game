<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📒 企业黄页系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        header p { opacity: 0.9; font-size: 1.1rem; }
        
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .nav-tab:hover, .nav-tab.active {
            background: white;
            color: #667eea;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        .search-box button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .search-box button:hover {
            transform: scale(1.05);
        }
        
        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .contact-card {
            background: linear-gradient(145deg, #f8f9fa, #ffffff);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e9ecef;
            transition: all 0.3s;
            cursor: pointer;
        }
        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .contact-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .contact-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        .contact-info .dept {
            color: #667eea;
            font-size: 13px;
            font-weight: 500;
        }
        .contact-details {
            color: #666;
            font-size: 14px;
            line-height: 1.8;
        }
        .contact-details span {
            display: block;
        }
        .contact-details .label {
            color: #999;
            font-size: 12px;
        }
        .tags {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .tag {
            padding: 4px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .add-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }
        .add-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h2 {
            color: #333;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:hover {
            opacity: 0.9;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-card h4 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .game-section {
            margin-top: 30px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .game-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .game-card .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .game-card h4 {
            color: white;
            margin-bottom: 5px;
        }
        .game-card p {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📒 企业黄页系统</h1>
            <p>内部通讯录 · 人员管理 · 组织架构</p>
        </header>
        
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('contacts')">👥 通讯录</button>
            <button class="nav-tab" onclick="showTab('games')">🎮 音游测试</button>
        </div>
        
        <!-- 通讯录页面 -->
        <div id="contacts-tab" class="tab-content">
            <div class="card">
                <div class="stats">
                    <div class="stat-card">
                        <h4>总人数</h4>
                        <div class="number" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h4>部门数</h4>
                        <div class="number" id="deptCount">0</div>
                    </div>
                    <div class="stat-card">
                        <h4>本月新增</h4>
                        <div class="number">5</div>
                    </div>
                    <div class="stat-card">
                        <h4>在线</h4>
                        <div class="number">12</div>
                    </div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索姓名、部门、职位..." oninput="searchContacts()">
                    <button onclick="searchContacts()">🔍 搜索</button>
                </div>
                
                <div class="contacts-grid" id="contactsGrid">
                    <!-- 联系人卡片将在这里生成 -->
                </div>
                
                <div class="empty-state" id="emptyState" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <h3>暂无联系人</h3>
                    <p>点击右下角按钮添加第一个联系人</p>
                </div>
            </div>
        </div>
        
        <!-- 游戏测试页面 -->
        <div id="games-tab" class="tab-content" style="display: none;">
            <div class="card">
                <h2 style="margin-bottom: 10px;">🎵 音游原型测试</h2>
                <p style="color: #666; margin-bottom: 20px;">点击下方卡片测试不同风格的音游原型</p>
                
                <div class="game-grid">
                    <div class="game-card" onclick="openGame('proto1_falling.html')">
                        <div class="icon">🎵</div>
                        <h4>下落式节奏</h4>
                        <p>经典4轨 · D/F/J/K</p>
                    </div>
                    <div class="game-card" onclick="openGame('proto2_osu.html')">
                        <div class="icon">🎯</div>
                        <h4>OSU!风格</h4>
                        <p>点击圆圈 · 鼠标操作</p>
                    </div>
                    <div class="game-card" onclick="openGame('proto3_piano.html')">
                        <div class="icon">🎹</div>
                        <h4>钢琴瀑布流</h4>
                        <p>Synthesia风 · 键盘演奏</p>
                    </div>
                    <div class="game-card" onclick="openGame('proto4_retro.html')">
                        <div class="icon">👾</div>
                        <h4>复古像素风</h4>
                        <p>8-bit风格 · Z/X/N/M</p>
                    </div>
                    <div class="game-card" onclick="openGame('proto5_mixed.html')">
                        <div class="icon">🌊</div>
                        <h4>混合玩法</h4>
                        <p>滑条+长按 · 综合挑战</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <button class="add-btn" onclick="openModal()">+</button>
    
    <!-- 添加联系人弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加联系人</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form onsubmit="addContact(event)">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" id="name" required placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>部门 *</label>
                    <select id="dept" required>
                        <option value="">请选择部门</option>
                        <option value="技术部">技术部</option>
                        <option value="产品部">产品部</option>
                        <option value="运营部">运营部</option>
                        <option value="市场部">市场部</option>
                        <option value="人事部">人事部</option>
                        <option value="财务部">财务部</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>职位</label>
                    <input type="text" id="position" placeholder="例如：高级前端工程师">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="phone" placeholder="138 0000 0000">
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="email" placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>办公位置</label>
                    <input type="text" id="location" placeholder="例如：A座 3层 301">
                </div>
                <button type="submit" class="submit-btn">✅ 保存联系人</button>
            </form>
        </div>
    </div>
    
    <script>
        // 初始数据
        let contacts = [
            { id: 1, name: '张三', dept: '技术部', position: '前端负责人', phone: '13800138001', email: 'zhangsan@company.com', location: 'A座3层-301', tags: ['前端', 'React'] },
            { id: 2, name: '李四', dept: '技术部', position: '后端工程师', phone: '13800138002', email: 'lisi@company.com', location: 'A座3层-302', tags: ['后端', 'Java'] },
            { id: 3, name: '王五', dept: '产品部', position: '产品经理', phone: '13800138003', email: 'wangwu@company.com', location: 'A座2层-201', tags: ['产品', 'Axure'] },
            { id: 4, name: '赵六', dept: '运营部', position: '运营总监', phone: '13800138004', email: 'zhaoliu@company.com', location: 'A座2层-205', tags: ['运营', '数据分析'] },
            { id: 5, name: '孙七', dept: '市场部', position: '市场经理', phone: '13800138005', email: 'sunqi@company.com', location: 'A座1层-101', tags: ['市场', '品牌'] },
            { id: 6, name: '周八', dept: '人事部', position: 'HRBP', phone: '13800138006', email: 'zhouba@company.com', location: 'A座1层-105', tags: ['人事', '招聘'] }
        ];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderContacts();
            updateStats();
        });
        
        // 渲染联系人
        function renderContacts(filtered = contacts) {
            const grid = document.getElementById('contactsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            grid.innerHTML = filtered.map(contact => `
                <div class="contact-card" onclick="viewContact(${contact.id})">
                    <div class="contact-header">
                        <div class="avatar">${contact.name.charAt(0)}</div>
                        <div class="contact-info">
                            <h3>${contact.name}</h3>
                            <span class="dept">${contact.dept} · ${contact.position || '员工'}</span>
                        </div>
                    </div>
                    <div class="contact-details">
                        <span>📱 ${contact.phone || '暂无电话'}</span>
                        <span>📧 ${contact.email || '暂无邮箱'}</span>
                        <span>📍 ${contact.location || '暂无位置'}</span>
                    </div>
                    <div class="tags">
                        ${(contact.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // 搜索
        function searchContacts() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = contacts.filter(c => 
                c.name.toLowerCase().includes(keyword) ||
                c.dept.toLowerCase().includes(keyword) ||
                (c.position && c.position.toLowerCase().includes(keyword)) ||
                (c.phone && c.phone.includes(keyword))
            );
            renderContacts(filtered);
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = contacts.length;
            const depts = new Set(contacts.map(c => c.dept));
            document.getElementById('deptCount').textContent = depts.size;
        }
        
        // 弹窗控制
        function openModal() {
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.querySelector('form').reset();
        }
        
        // 添加联系人
        function addContact(e) {
            e.preventDefault();
            
            const newContact = {
                id: Date.now(),
                name: document.getElementById('name').value,
                dept: document.getElementById('dept').value,
                position: document.getElementById('position').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                location: document.getElementById('location').value,
                tags: [document.getElementById('dept').value.replace('部', '')]
            };
            
            contacts.push(newContact);
            renderContacts();
            updateStats();
            closeModal();
        }
        
        // 查看详情
        function viewContact(id) {
            const contact = contacts.find(c => c.id === id);
            alert(`姓名：${contact.name}\n部门：${contact.dept}\n职位：${contact.position || '员工'}\n电话：${contact.phone || '暂无'}\n邮箱：${contact.email || '暂无'}\n位置：${contact.location || '暂无'}`);
        }
        
        // 切换标签页
        function showTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('contacts-tab').style.display = tab === 'contacts' ? 'block' : 'none';
            document.getElementById('games-tab').style.display = tab === 'games' ? 'block' : 'none';
        }
        
        // 打开游戏
        function openGame(url) {
            window.open(url, '_blank', 'width=800,height=700,scrollbars=yes');
        }
        
        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
