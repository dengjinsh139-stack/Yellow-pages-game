<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>来组乐队吧 v2.5 | 5关卡版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Press Start 2P', cursive;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        .title {
            font-size: 1.2rem;
            color: #ff0066;
            text-shadow: 4px 4px 0 #660033;
            margin: 20px 0 15px;
            text-align: center;
        }
        .screen {
            width: 900px;
            max-width: 95vw;
            height: 650px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 4px solid #333;
            position: relative;
            display: none;
        }
        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .subtitle {
            font-size: 0.7rem;
            color: #00ff99;
            margin-bottom: 20px;
        }
        .level-select {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .level-card {
            width: 150px;
            height: 200px;
            background: linear-gradient(145deg, #2a2a4e, #1a1a3e);
            border: 4px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .level-card:hover:not(.locked) {
            border-color: #ff0066;
            transform: scale(1.05);
        }
        .level-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .level-num { font-size: 2.5rem; color: #ffcc00; margin-bottom: 10px; }
        .level-card.locked .level-num { color: #444; }
        .level-name { font-size: 0.55rem; color: #fff; text-align: center; }
        .level-bpm { font-size: 0.45rem; color: #888; }
        .level-stars { font-size: 0.6rem; color: #ffcc00; margin-top: 10px; }
        .instrument-select { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .instrument-card {
            width: 160px; height: 200px;
            background: linear-gradient(145deg, #2a2a4e, #1a1a3e);
            border: 4px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .instrument-card:hover { border-color: #ff0066; transform: scale(1.05); }
        .instrument-icon { font-size: 3rem; margin-bottom: 10px; }
        .instrument-name { font-size: 0.65rem; color: #fff; }
        .instrument-keys { font-size: 0.4rem; color: #00ff99; margin-top: 8px; padding: 4px 8px; border: 1px solid #00ff99; }
        #gameCanvas { background: #0a0a1a; border: 2px solid #333; }
        .hud { position: absolute; top: 15px; left: 20px; right: 20px; display: flex; justify-content: space-between; font-size: 0.6rem; }
        .hud-item { display: flex; flex-direction: column; }
        .hud-label { color: #888; font-size: 0.45rem; }
        .hud-value { color: #ffcc00; font-size: 0.9rem; }
        .energy-container { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 400px; height: 25px; background: #1a1a3e; border: 3px solid #444; border-radius: 12px; overflow: hidden; }
        .energy-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff0066, #ffcc00, #00ff99); }
        .energy-label { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 0.5rem; color: #ffcc00; }
        .level-indicator { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; background: rgba(255,0,102,0.3); padding: 8px 20px; border: 2px solid #ff0066; }
        .btn { padding: 15px 40px; background: linear-gradient(145deg, #ff0066, #cc0052); border: 4px solid #fff; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 0.7rem; cursor: pointer; margin-top: 20px; }
        .back-btn { position: absolute; top: 15px; left: 15px; padding: 10px 20px; background: #333; border: 3px solid #555; color: #fff; font-family: 'Press Start 2P', cursive; font-size: 0.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1 class="title">🎸 来组乐队吧 v2.5</h1>
    
    <div id="levelScreen" class="screen active">
        <p class="subtitle">▼ 选择演出场地 ▼</p>
        <div class="level-select">
            <div class="level-card" id="level-1" onclick="selectLevel(1)">
                <div class="level-num">1</div>
                <div class="level-name">车库练习</div>
                <div class="level-bpm">BPM 80</div>
                <div class="level-stars">⭐</div>
            </div>
            <div class="level-card locked" id="level-2" onclick="selectLevel(2)">
                <div class="level-num">2</div>
                <div class="level-name">俱乐部之夜</div>
                <div class="level-bpm">BPM 100</div>
                <div class="level-stars">⭐⭐</div>
            </div>
            <div class="level-card locked" id="level-3" onclick="selectLevel(3)">
                <div class="level-num">3</div>
                <div class="level-name">音乐节现场</div>
                <div class="level-bpm">BPM 120</div>
                <div class="level-stars">⭐⭐⭐</div>
            </div>
            <div class="level-card locked" id="level-4" onclick="selectLevel(4)">
                <div class="level-num">4</div>
                <div class="level-name">体育馆巡演</div>
                <div class="level-bpm">BPM 140</div>
                <div class="level-stars">⭐⭐⭐⭐</div>
            </div>
            <div class="level-card locked" id="level-5" onclick="selectLevel(5)">
                <div class="level-num">5</div>
                <div class="level-name">传奇演唱会</div>
                <div class="level-bpm">BPM 160</div>
                <div class="level-stars">⭐⭐⭐⭐⭐</div>
            </div>
        </div>
        <p style="font-size: 0.45rem; color: #666; margin-top: 20px;">通关后解锁下一关</p>
    </div>

    <div id="instrumentScreen" class="screen">
        <button class="back-btn" onclick="backToLevel()">← 返回</button>
        <p class="subtitle">▼ 选择乐器 ▼</p>
        <div class="instrument-select">
            <div class="instrument-card" onclick="selectInstrument('drum')">
                <div class="instrument-icon">🥁</div>
                <div class="instrument-name">鼓手</div>
                <div class="instrument-keys">D F J K</div>
            </div>
            <div class="instrument-card" onclick="selectInstrument('guitar')">
                <div class="instrument-icon">🎸</div>
                <div class="instrument-name">吉他</div>
                <div class="instrument-keys">D J</div>
            </div>
            <div class="instrument-card" onclick="selectInstrument('bass')">
                <div class="instrument-icon">🎸</div>
                <div class="instrument-name">贝斯</div>
                <div class="instrument-keys">D J</div>
            </div>
            <div class="instrument-card" onclick="selectInstrument('keyboard')">
                <div class="instrument-icon">🎹</div>
                <div class="instrument-name">键盘</div>
                <div class="instrument-keys">D F J K</div>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <button class="back-btn" onclick="backToLevel()">← 退出</button>
        <div class="level-indicator" id="levelIndicator">关卡 1</div>
        <div class="hud">
            <div class="hud-item">
                <div class="hud-label">SCORE</div>
                <div class="hud-value" id="scoreDisplay">000000</div>
            </div>
            <div class="hud-item">
                <div class="hud-label">COMBO</div>
                <div class="hud-value" id="comboDisplay">0</div>
            </div>
        </div>
        <div class="energy-container">
            <div class="energy-label">BAND ENERGY</div>
            <div class="energy-bar" id="energyBar"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div id="resultScreen" class="screen">
        <div class="result-title" style="font-size: 1.5rem; color: #ffcc00; margin-bottom: 15px;">演出结束!</div>
        <div class="result-score" id="finalScore" style="font-size: 3rem;">0</div>
        <div class="result-rank" id="finalRank" style="font-size: 4rem;">S</div>
        <div id="nextLevelBtn" style="display: none;">
            <button class="btn" onclick="goToNextLevel()">下一关 →</button>
        </div>
        <button class="btn" onclick="backToLevel()">返回关卡选择</button>
    </div>

<script>
const levelConfig = {
    1: { name: '车库练习', bpm: 80 },
    2: { name: '俱乐部之夜', bpm: 100 },
    3: { name: '音乐节现场', bpm: 120 },
    4: { name: '体育馆巡演', bpm: 140 },
    5: { name: '传奇演唱会', bpm: 160 }
};

let gameState = {
    currentLevel: 1,
    unlockedLevel: 1,
    instrument: null,
    score: 0, combo: 0, maxCombo: 0,
    perfectCount: 0, goodCount: 0, missCount: 0,
    bandEnergy: 0, isRockMode: false, isPlaying: false,
    notes: [], gameStartTime: 0, laneCount: 4
};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectLevel(level) {
    if (level > gameState.unlockedLevel) return;
    gameState.currentLevel = level;
    document.getElementById('levelIndicator').textContent = '关卡 ' + level + ': ' + levelConfig[level].name;
    showScreen('instrumentScreen');
}

function selectInstrument(inst) {
    gameState.instrument = inst;
    gameState.laneCount = (inst === 'drum' || inst === 'keyboard') ? 4 : 2;
    showScreen('gameScreen');
    startGame();
}

function backToLevel() {
    gameState.isPlaying = false;
    showScreen('levelScreen');
    updateLevelScreen();
}

function updateLevelScreen() {
    for (let i = 1; i <= 5; i++) {
        const card = document.getElementById('level-' + i);
        card.classList.remove('locked');
        if (i > gameState.unlockedLevel) card.classList.add('locked');
    }
}

function goToNextLevel() {
    if (gameState.currentLevel < 5) selectLevel(gameState.currentLevel + 1);
}

function startGame() {
    gameState.score = 0; gameState.combo = 0; gameState.maxCombo = 0;
    gameState.perfectCount = 0; gameState.goodCount = 0; gameState.missCount = 0;
    gameState.bandEnergy = 0; gameState.isRockMode = false;
    gameState.isPlaying = true;
    gameState.notes = generateNotes(gameState.currentLevel, gameState.instrument);
    gameState.gameStartTime = Date.now();
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const laneCount = gameState.laneCount;
    const laneWidth = canvas.width / laneCount;
    const hitLineY = 400;
    const bpm = levelConfig[gameState.currentLevel].bpm;
    const noteSpeed = bpm * 2;
    
    updateHUD();
    
    const keyMap = laneCount === 4 ? {'KeyD': 0, 'KeyF': 1, 'KeyJ': 2, 'KeyK': 3} : {'KeyD': 0, 'KeyK': 1};
    
    const keyHandler = function(e) {
        if (!gameState.isPlaying) return;
        const lane = keyMap[e.code];
        if (lane === undefined) return;
        e.preventDefault();
        
        const currentTime = Date.now() - gameState.gameStartTime;
        
        let nearestNote = null, minTimeDiff = Infinity;
        gameState.notes.forEach(function(note) {
            if (note.hit || note.lane !== lane) return;
            const timeDiff = Math.abs(note.time - currentTime);
            if (timeDiff < minTimeDiff && timeDiff < 200) {
                minTimeDiff = timeDiff;
                nearestNote = note;
            }
        });
        
        if (nearestNote) {
            nearestNote.hit = true;
            if (minTimeDiff <= 100) {
                gameState.combo++;
                gameState.perfectCount++;
                gameState.score += 100;
                showJudgment('PERFECT', nearestNote.lane * laneWidth + laneWidth / 2, hitLineY);
            } else {
                gameState.combo++;
                gameState.goodCount++;
                gameState.score += 50;
                showJudgment('GOOD', nearestNote.lane * laneWidth + laneWidth / 2, hitLineY);
            }
            if (gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
            updateHUD();
        }
    };
    
    document.addEventListener('keydown', keyHandler);
    window.gameKeyHandler = keyHandler;
    
    const gameLoop = setInterval(function() {
        if (!gameState.isPlaying) { clearInterval(gameLoop); return; }
        
        const currentTime = Date.now() - gameState.gameStartTime;
        
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        for (let i = 1; i < laneCount; i++) {
            ctx.beginPath();
            ctx.moveTo(i * laneWidth, 0);
            ctx.lineTo(i * laneWidth, canvas.height);
            ctx.stroke();
        }
        
        ctx.strokeStyle = '#ff0066';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, hitLineY);
        ctx.lineTo(canvas.width, hitLineY);
        ctx.stroke();
        
        ctx.font = '16px "Press Start 2P"';
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        const keyLabels = laneCount === 4 ? ['D', 'F', 'J', 'K'] : ['D', 'K'];
        keyLabels.forEach(function(key, i) {
            ctx.fillText(key, i * laneWidth + laneWidth / 2, hitLineY + 30);
        });
        
        gameState.notes.forEach(function(note) {
            if (note.hit) return;
            const timeDiff = note.time - currentTime;
            const y = hitLineY - (timeDiff / 1000) * noteSpeed;
            
            if (y > -50 && y < canvas.height + 50) {
                const x = note.lane * laneWidth + laneWidth / 2;
                ctx.fillStyle = '#00ff99';
                const w = laneWidth * 0.7;
                ctx.fillRect(x - w/2, y - 10, w, 20);
            }
            
            if (y > canvas.height + 30) {
                note.hit = true;
                gameState.combo = 0;
                gameState.missCount++;
                updateHUD();
            }
        });
        
        if (currentTime > 22000) {
            clearInterval(gameLoop);
            endGame();
        }
    }, 1000/60);
}

function generateNotes(level, instrument) {
    const notes = [];
    const bpm = levelConfig[level].bpm;
    const beatInterval = 60000 / bpm;
    const totalBeats = 30;
    
    for (let beat = 0; beat < totalBeats; beat++) {
        const time = beat * beatInterval + 2000;
        const beatInBar = beat % 4;
        
        if (instrument === 'drum') {
            if (beat % 2 === 0) notes.push({ time, lane: beatInBar % 4, hit: false });
        } else if (instrument === 'guitar') {
            if (beatInBar === 0 || beatInBar === 2) notes.push({ time, lane: 0, hit: false });
        } else if (instrument === 'bass') {
            if (beat % 2 === 0) notes.push({ time, lane: 0, hit: false });
        } else if (instrument === 'keyboard') {
            if (beatInBar === 0) {
                notes.push({ time, lane: 0, hit: false });
                if (level >= 3) notes.push({ time: time + 150, lane: 1, hit: false });
            }
        }
    }
    return notes;
}

function showJudgment(text, x, y) {
    const el = document.createElement('div');
    el.className = 'judgment ' + text.toLowerCase();
    el.textContent = text;
    el.style.cssText = 'position:absolute;left:' + x + 'px;top:' + (y-50) + 'px;font-size:1.5rem;font-weight:bold;animation:fadeOut 0.4s;';
    if (text === 'PERFECT') el.style.color = '#ffcc00';
    else if (text === 'GOOD') el.style.color = '#00ff99';
    else el.style.color = '#ff3333';
    document.getElementById('gameScreen').appendChild(el);
    setTimeout(function() { el.remove(); }, 400);
}

function updateHUD() {
    document.getElementById('scoreDisplay').textContent = Math.floor(gameState.score).toString().padStart(6, '0');
    document.getElementById('comboDisplay').textContent = gameState.combo;
}

function endGame() {
    gameState.isPlaying = false;
    if (window.gameKeyHandler) document.removeEventListener('keydown', window.gameKeyHandler);
    
    const total = gameState.perfectCount + gameState.goodCount + gameState.missCount;
    const accuracy = total > 0 ? ((gameState.perfectCount + gameState.goodCount * 0.5) / total * 100) : 0;
    
    let rank = 'C';
    if (accuracy >= 95) rank = 'S';
    else if (accuracy >= 85) rank = 'A';
    else if (accuracy >= 70) rank = 'B';
    
    if (rank !== 'C' && gameState.currentLevel >= gameState.unlockedLevel && gameState.currentLevel < 5) {
        gameState.unlockedLevel = gameState.currentLevel + 1;
        document.getElementById('nextLevelBtn').style.display = 'block';
    } else {
        document.getElementById('nextLevelBtn').style.display = 'none';
    }
    
    document.getElementById('finalScore').textContent = Math.floor(gameState.score);
    document.getElementById('finalRank').textContent = rank;
    showScreen('resultScreen');
    updateLevelScreen();
}

updateLevelScreen();
console.log('v2.5 loaded');
</script>
</body>
</html>
