<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎢 音速滑行</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameCanvas {
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="ui">得分: <span id="score">0</span> | 速度: <span id="speed">100%</span></div>
    <canvas id="gameCanvas" width="700" height="500"></canvas>
    <div class="controls">⬅️ ➡️ 控制滑行方向 | 收集音符得分 | 避开障碍</div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let score = 0;
        let playerX = canvas.width / 2;
        const playerY = 400;
        let notes = [];
        let obstacles = [];
        let particles = [];
        let gameSpeed = 3;
        let speedMultiplier = 1;
        
        // 背景音乐 - 电子风格
        let bgmStep = 0;
        const bassLine = [65.41, 65.41, 73.42, 65.41, 87.31, 65.41, 98.00, 87.31];
        const melody = [523.25, 587.33, 659.25, 523.25, 783.99, 659.25, 587.33, 523.25];
        
        function playBGM() {
            const t = audioCtx.currentTime;
            
            // 低音
            const bass = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            bass.connect(bassGain);
            bassGain.connect(audioCtx.destination);
            bass.type = 'sawtooth';
            bass.frequency.value = bassLine[bgmStep % bassLine.length];
            bassGain.gain.setValueAtTime(0.3, t);
            bassGain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
            bass.start(t);
            bass.stop(t + 0.15);
            
            // 旋律（每两拍）
            if (bgmStep % 2 === 0) {
                const lead = audioCtx.createOscillator();
                const leadGain = audioCtx.createGain();
                lead.connect(leadGain);
                leadGain.connect(audioCtx.destination);
                lead.type = 'square';
                lead.frequency.value = melody[Math.floor(bgmStep / 2) % melody.length];
                leadGain.gain.setValueAtTime(0.15, t);
                leadGain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                lead.start(t);
                lead.stop(t + 0.2);
            }
            
            // 鼓点
            const kick = audioCtx.createOscillator();
            const kickGain = audioCtx.createGain();
            kick.connect(kickGain);
            kickGain.connect(audioCtx.destination);
            kick.frequency.setValueAtTime(150, t);
            kick.frequency.exponentialRampToValueAtTime(50, t + 0.1);
            kickGain.gain.setValueAtTime(0.4, t);
            kickGain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
            kick.start(t);
            kick.stop(t + 0.2);
            
            bgmStep++;
        }
        
        // 收集音效
        function playCollect() {
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, t);
            osc.frequency.linearRampToValueAtTime(1760, t + 0.1);
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
            osc.start(t);
            osc.stop(t + 0.2);
        }
        
        // 撞击音效
        function playCrash() {
            const t = audioCtx.currentTime;
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.4, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start(t);
        }
        
        // 生成音符
        function spawnNote() {
            notes.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: -50,
                radius: 20,
                color: `hsl(${Math.random() * 60 + 120}, 100%, 60%)`,
                value: 100
            });
        }
        
        // 生成障碍
        function spawnObstacle() {
            obstacles.push({
                x: Math.random() * (canvas.width - 100) + 50,
                y: -50,
                width: 60,
                height: 60,
                speed: gameSpeed * speedMultiplier
            });
        }
        
        // 绘制网格背景
        function drawGrid() {
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            const offset = (Date.now() * 0.1) % 50;
            
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = offset; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
        // 绘制玩家
        function drawPlayer() {
            ctx.save();
            ctx.translate(playerX, playerY);
            
            // 滑行轨迹
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.fillRect(-30, 20, 60, 40);
            
            // 主体
            ctx.fillStyle = '#0ff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#0ff';
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(-25, 20);
            ctx.lineTo(-15, 30);
            ctx.lineTo(15, 30);
            ctx.lineTo(25, 20);
            ctx.closePath();
            ctx.fill();
            
            // 核心
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 游戏循环
        function gameLoop() {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            
            // 更新和绘制音符
            notes = notes.filter(n => {
                n.y += gameSpeed * speedMultiplier;
                
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
                ctx.fillStyle = n.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = n.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 碰撞检测
                const dx = n.x - playerX;
                const dy = n.y - playerY;
                if (Math.sqrt(dx*dx + dy*dy) < n.radius + 25) {
                    score += n.value;
                    speedMultiplier = Math.min(2, speedMultiplier + 0.05);
                    document.getElementById('score').textContent = score;
                    document.getElementById('speed').textContent = Math.round(speedMultiplier * 100) + '%';
                    playCollect();
                    return false;
                }
                
                return n.y < canvas.height + 50;
            });
            
            // 更新和绘制障碍
            obstacles = obstacles.filter(o => {
                o.y += o.speed;
                
                ctx.fillStyle = '#f00';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#f00';
                ctx.fillRect(o.x - o.width/2, o.y - o.height/2, o.width, o.height);
                ctx.strokeStyle = '#800';
                ctx.lineWidth = 3;
                ctx.strokeRect(o.x - o.width/2, o.y - o.height/2, o.width, o.height);
                ctx.shadowBlur = 0;
                
                // 碰撞检测
                if (Math.abs(o.x - playerX) < 40 && Math.abs(o.y - playerY) < 40) {
                    score = Math.max(0, score - 200);
                    speedMultiplier = Math.max(0.5, speedMultiplier - 0.2);
                    document.getElementById('score').textContent = score;
                    document.getElementById('speed').textContent = Math.round(speedMultiplier * 100) + '%';
                    playCrash();
                    return false;
                }
                
                return o.y < canvas.height + 50;
            });
            
            drawPlayer();
            requestAnimationFrame(gameLoop);
        }
        
        // 控制
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') playerX = Math.max(40, playerX - 30);
            if (e.key === 'ArrowRight') playerX = Math.min(canvas.width - 40, playerX + 30);
        });
        
        // 触摸控制
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            playerX = touch.clientX - rect.left;
        });
        
        // 启动
        setInterval(spawnNote, 600);
        setInterval(spawnObstacle, 2000);
        setInterval(playBGM, 250);
        
        if (audioCtx.state === 'suspended') {
            document.addEventListener('click', () => audioCtx.resume(), { once: true });
        }
        
        gameLoop();
    </script>
</body>
</html>
