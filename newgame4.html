<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 节奏大师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
        }
        .ui {
            position: absolute;
            top: 20px;
            font-size: 24px;
            text-align: center;
        }
        .combo {
            font-size: 48px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="ui">
        得分: <span id="score">0</span>
        <div class="combo"><span id="combo">0</span></div>
    </div>
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        let score = 0, combo = 0;
        let circles = [];
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // BGM节拍
        const beatPattern = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63];
        let beatIndex = 0;
        
        function playBGM() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = beatPattern[beatIndex % beatPattern.length];
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
            beatIndex++;
            
            // 生成圆圈
            if(beatIndex % 2 === 0) spawnCircle();
        }
        
        function playHit(perfect) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = perfect ? 880 : 440;
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
        
        function spawnCircle() {
            const angle = Math.random() * Math.PI * 2;
            circles.push({
                x: centerX + Math.cos(angle) * 200,
                y: centerY + Math.sin(angle) * 200,
                targetX: centerX,
                targetY: centerY,
                radius: 40,
                life: 1,
                maxLife: 60
            });
        }
        
        function gameLoop() {
            // 背景
            ctx.fillStyle = 'rgba(15, 12, 41, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 中心目标
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.stroke();
            
            // 更新圆圈
            circles = circles.filter(c => {
                c.life--;
                const progress = 1 - c.life / c.maxLife;
                c.x = c.x + (c.targetX - c.x) * 0.05;
                c.y = c.y + (c.targetY - c.y) * 0.05;
                c.radius = 40 + progress * 20;
                
                const alpha = c.life / c.maxLife;
                ctx.fillStyle = `rgba(255, 0, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                ctx.fill();
                
                return c.life > 0;
            });
            
            requestAnimationFrame(gameLoop);
        }
        
        // 点击检测
        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            circles.forEach((c, i) => {
                const dist = Math.sqrt((x - c.x) ** 2 + (y - c.y) ** 2);
                if(dist < c.radius + 20) {
                    const perfect = c.life > 45 || c.life < 15;
                    score += perfect ? 300 : 100;
                    combo++;
                    document.getElementById('score').textContent = score;
                    document.getElementById('combo').textContent = combo;
                    playHit(perfect);
                    circles.splice(i, 1);
                }
            });
        });
        
        setInterval(playBGM, 400);
        
        if(audioCtx.state === 'suspended') {
            document.addEventListener('click', ()=>audioCtx.resume(),{once:true});
        }
        
        gameLoop();
    </script>
</body>
</html>
