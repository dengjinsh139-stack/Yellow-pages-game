<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际射击 - Space Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #0a0a2e, #1a1a4e); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        #gameCanvas { 
            border: 2px solid #00ffff; 
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
            max-width: 100%;
            max-height: 80vh;
        }
        #ui {
            color: #00ffff;
            text-align: center;
            margin: 10px;
            font-size: 18px;
        }
        #score { font-size: 24px; font-weight: bold; }
        #startBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #ff006e, #8338ec);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.3s;
        }
        #startBtn:hover { transform: scale(1.1); }
        .hidden { display: none !important; }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff006e;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">得分: 0</div>
        <div id="lives">生命: ❤️❤️❤️</div>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <button id="startBtn">开始游戏</button>
    <div id="gameOver" class="hidden">
        <h2>游戏结束</h2>
        <p id="finalScore">最终得分: 0</p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const startBtn = document.getElementById('startBtn');
        const gameOverDiv = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');

        // 响应式画布
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 800);
            const maxHeight = Math.min(window.innerHeight - 150, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Web Audio API 背景音乐系统
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let bgmOscillators = [];
        let isPlayingBGM = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playShootSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playExplosionSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playBGM() {
            if (!audioCtx || isPlayingBGM) return;
            isPlayingBGM = true;
            
            const notes = [220, 261.63, 329.63, 392, 440, 392, 329.63, 261.63];
            let noteIndex = 0;
            
            function playNote() {
                if (!isPlayingBGM) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.value = notes[noteIndex % notes.length];
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                noteIndex++;
                setTimeout(playNote, 250);
            }
            playNote();
        }

        function stopBGM() {
            isPlayingBGM = false;
        }

        // 游戏状态
        let gameState = 'menu';
        let score = 0;
        let lives = 3;
        let player, bullets, enemies, particles, stars;

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 80;
                this.width = 50;
                this.height = 50;
                this.speed = 8;
                this.color = '#00ffff';
            }
            
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.height/2);
                ctx.lineTo(this.x - this.width/2, this.y + this.height/2);
                ctx.lineTo(this.x, this.y + this.height/4);
                ctx.lineTo(this.x + this.width/2, this.y + this.height/2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
            
            move(direction) {
                this.x += direction * this.speed;
                this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
            }
        }

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 4;
                this.height = 15;
                this.speed = 12;
                this.active = true;
            }
            
            update() {
                this.y -= this.speed;
                if (this.y < -20) this.active = false;
            }
            
            draw() {
                ctx.save();
                ctx.fillStyle = '#ff006e';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff006e';
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.width = 40;
                this.height = 40;
                this.x = Math.random() * (canvas.width - this.width) + this.width/2;
                this.y = -50;
                this.speed = 2 + Math.random() * 3 + score / 500;
                this.active = true;
                this.color = `hsl(${Math.random() * 60 + 300}, 100%, 50%)`;
                this.hp = 1 + Math.floor(score / 1000);
            }
            
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.y * 0.02) * 2;
                if (this.y > canvas.height + 50) {
                    this.active = false;
                    lives--;
                    updateUI();
                }
            }
            
            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x - 8, this.y - 5, 5, 0, Math.PI * 2);
                ctx.arc(this.x + 8, this.y - 5, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        class Star {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height;
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 2 + 0.5;
                this.speed = this.size * 2;
                this.brightness = Math.random();
            }
            
            update() {
                this.y += this.speed;
                if (this.y > canvas.height) this.reset();
            }
            
            draw() {
                ctx.fillStyle = `rgba(255,255,255,${this.brightness})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
            playExplosionSound();
        }

        function initGame() {
            player = new Player();
            bullets = [];
            enemies = [];
            particles = [];
            stars = Array(100).fill(null).map(() => new Star());
            score = 0;
            lives = 3;
            updateUI();
        }

        function updateUI() {
            scoreEl.textContent = `得分: ${score}`;
            livesEl.textContent = '生命: ' + '❤️'.repeat(Math.max(0, lives));
        }

        function spawnEnemy() {
            if (Math.random() < 0.02 + score / 50000) {
                enemies.push(new Enemy());
            }
        }

        function checkCollisions() {
            bullets.forEach(bullet => {
                enemies.forEach(enemy => {
                    if (!bullet.active || !enemy.active) return;
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < enemy.width/2 + bullet.width) {
                        bullet.active = false;
                        enemy.hp--;
                        if (enemy.hp <= 0) {
                            enemy.active = false;
                            score += 10 * (1 + Math.floor(score / 1000));
                            createExplosion(enemy.x, enemy.y, enemy.color);
                            updateUI();
                        }
                    }
                });
            });

            enemies.forEach(enemy => {
                if (!enemy.active) return;
                const dx = player.x - enemy.x;
                const dy = player.y - enemy.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < player.width/2 + enemy.width/2) {
                    enemy.active = false;
                    lives--;
                    createExplosion(player.x, player.y, '#00ffff');
                    updateUI();
                }
            });
        }

        let keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && gameState === 'playing') {
                bullets.push(new Bullet(player.x, player.y - player.height/2));
                playShootSound();
            }
        });
        window.addEventListener('keyup', e => keys[e.key] = false);

        // 触摸控制
        let touchStartX = null;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            if (gameState === 'playing') {
                bullets.push(new Bullet(player.x, player.y - player.height/2));
                playShootSound();
            }
        });
        canvas.addEventListener('touchmove', e => {
            if (touchStartX !== null && gameState === 'playing') {
                const touchX = e.touches[0].clientX;
                const diff = touchX - touchStartX;
                player.x += diff * 0.5;
                player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
                touchStartX = touchX;
            }
        });
        canvas.addEventListener('touchend', () => touchStartX = null);

        function gameLoop() {
            if (gameState !== 'playing') return;

            ctx.fillStyle = 'rgba(10, 10, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => { star.update(); star.draw(); });

            if (keys['ArrowLeft'] || keys['a']) player.move(-1);
            if (keys['ArrowRight'] || keys['d']) player.move(1);

            bullets = bullets.filter(b => b.active);
            bullets.forEach(b => { b.update(); b.draw(); });

            enemies = enemies.filter(e => e.active);
            enemies.forEach(e => { e.update(); e.draw(); });

            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });

            spawnEnemy();
            checkCollisions();
            player.draw();

            if (lives <= 0) {
                gameState = 'gameover';
                stopBGM();
                finalScoreEl.textContent = `最终得分: ${score}`;
                gameOverDiv.classList.remove('hidden');
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        startBtn.addEventListener('click', () => {
            initAudio();
            playBGM();
            startBtn.classList.add('hidden');
            gameState = 'playing';
            initGame();
            gameLoop();
        });

        restartBtn.addEventListener('click', () => {
            gameOverDiv.classList.add('hidden');
            playBGM();
            gameState = 'playing';
            initGame();
            gameLoop();
        });

        // 自动射击
        setInterval(() => {
            if (gameState === 'playing') {
                bullets.push(new Bullet(player.x, player.y - player.height/2));
                playShootSound();
            }
        }, 250);
    </script>
</body>
</html>
