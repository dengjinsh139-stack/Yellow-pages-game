<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫逃脱 - 寻找出口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #e74c3c;
        }
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        .info-item {
            background: rgba(231, 76, 60, 0.2);
            padding: 8px 15px;
            border-radius: 15px;
            border: 1px solid #e74c3c;
        }
        canvas {
            border: 3px solid #e74c3c;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.3);
            background: #1a1a2e;
        }
        .controls {
            margin-top: 15px;
            color: #fff;
        }
        .mobile-controls {
            display: none;
            margin-top: 15px;
        }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }
        .d-btn {
            width: 60px;
            height: 60px;
            background: rgba(231, 76, 60, 0.5);
            border: 2px solid #e74c3c;
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
        }
        .d-btn:active {
            background: #e74c3c;
        }
        button {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        .music-btn {
            background: #8e44ad;
        }
        .level-select {
            margin: 10px 0;
        }
        select {
            padding: 5px 10px;
            border-radius: 5px;
            background: #333;
            color: #fff;
            border: 1px solid #e74c3c;
        }
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid #2ecc71;
            color: #fff;
            display: none;
            z-index: 100;
            text-align: center;
        }
        .game-over h2 {
            color: #2ecc71;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .mobile-controls { display: block; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🗿 迷宫逃脱</h1>
        <div class="info-bar">
            <div class="info-item">关卡: <span id="level">1</span></div>
            <div class="info-item">步数: <span id="steps">0</span></div>
            <div class="info-item">时间: <span id="time">0</span>s</div>
        </div>
        <div class="level-select">
            <label style="color:#fff;">难度:</label>
            <select id="levelSelect" onchange="changeLevel()">
                <option value="10">简单 (10x10)</option>
                <option value="15" selected>中等 (15x15)</option>
                <option value="20">困难 (20x20)</option>
                <option value="25">大师 (25x25)</option>
            </select>
        </div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <p>⌨️ 方向键或WASD移动 | 🏁 找到红色出口</p>
            <button onclick="startGame()">新游戏</button>
            <button class="music-btn" onclick="toggleMusic()">🎵 音乐</button>
        </div>
        <div class="mobile-controls">
            <div class="d-pad">
                <div></div>
                <button class="d-btn" ontouchstart="movePlayer(0, -1)" onmousedown="movePlayer(0, -1)">▲</button>
                <div></div>
                <button class="d-btn" ontouchstart="movePlayer(-1, 0)" onmousedown="movePlayer(-1, 0)">◀</button>
                <button class="d-btn" ontouchstart="movePlayer(0, 1)" onmousedown="movePlayer(0, 1)">▼</button>
                <button class="d-btn" ontouchstart="movePlayer(1, 0)" onmousedown="movePlayer(1, 0)">▶</button>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>🎉 逃脱成功!</h2>
        <p>用时: <span id="finalTime">0</span>秒</p>
        <p>步数: <span id="finalSteps">0</span></p>
        <p>评级: <span id="rating">-</span></p>
        <button onclick="nextLevel()">下一关</button>
        <button onclick="restartGame()">重玩本关</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let mazeSize = 15;
        let cellSize;
        let maze = [];
        let player = { x: 0, y: 0 };
        let exit = { x: 0, y: 0 };
        let level = 1;
        let steps = 0;
        let startTime;
        let gameTime = 0;
        let gameRunning = false;
        let musicEnabled = true;
        let visited = [];
        let path = [];
        
        // Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBackgroundMusic() {
            if (!musicEnabled) return;
            
            const playNote = (freq, duration, delay, type = 'sine') => {
                setTimeout(() => {
                    if (!musicEnabled || !gameRunning) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = type;
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                }, delay);
            };
            
            const loop = () => {
                if (!gameRunning || !musicEnabled) return;
                [65, 0, 73, 0, 82, 0, 98, 73].forEach((freq, i) => {
                    if (freq > 0) playNote(freq, 0.5, i * 300);
                });
                setTimeout(loop, 2500);
            };
            loop();
        }
        
        function playMoveSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 200;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        
        function playWinSound() {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.3);
                }, i * 150);
            });
        }
        
        // 生成迷宫 (递归回溯算法)
        function generateMaze() {
            maze = [];
            visited = [];
            for (let y = 0; y < mazeSize; y++) {
                maze[y] = [];
                visited[y] = [];
                for (let x = 0; x < mazeSize; x++) {
                    maze[y][x] = { top: true, right: true, bottom: true, left: true };
                    visited[y][x] = false;
                }
            }
            
            const stack = [{ x: 0, y: 0 }];
            visited[0][0] = true;
            
            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                const neighbors = [];
                
                if (current.y > 0 && !visited[current.y - 1][current.x]) {
                    neighbors.push({ x: current.x, y: current.y - 1, dir: 'top', opp: 'bottom' });
                }
                if (current.x < mazeSize - 1 && !visited[current.y][current.x + 1]) {
                    neighbors.push({ x: current.x + 1, y: current.y, dir: 'right', opp: 'left' });
                }
                if (current.y < mazeSize - 1 && !visited[current.y + 1][current.x]) {
                    neighbors.push({ x: current.x, y: current.y + 1, dir: 'bottom', opp: 'top' });
                }
                if (current.x > 0 && !visited[current.y][current.x - 1]) {
                    neighbors.push({ x: current.x - 1, y: current.y, dir: 'left', opp: 'right' });
                }
                
                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    maze[current.y][current.x][next.dir] = false;
                    maze[next.y][next.x][next.opp] = false;
                    visited[next.y][next.x] = true;
                    stack.push({ x: next.x, y: next.y });
                } else {
                    stack.pop();
                }
            }
            
            // 设置出口（最远点）
            exit = { x: mazeSize - 1, y: mazeSize - 1 };
            
            // 重置玩家位置
            player = { x: 0, y: 0 };
            steps = 0;
            path = [{ x: 0, y: 0 }];
            
            // 重置访问标记用于显示
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    visited[y][x] = false;
                }
            }
            visited[0][0] = true;
        }
        
        function movePlayer(dx, dy) {
            if (!gameRunning) return;
            
            const newX = player.x + dx;
            const newY = player.y + dy;
            
            // 检查边界
            if (newX < 0 || newX >= mazeSize || newY < 0 || newY >= mazeSize) return;
            
            // 检查墙壁
            let blocked = false;
            if (dx === 1 && maze[player.y][player.x].right) blocked = true;
            if (dx === -1 && maze[player.y][player.x].left) blocked = true;
            if (dy === 1 && maze[player.y][player.x].bottom) blocked = true;
            if (dy === -1 && maze[player.y][player.x].top) blocked = true;
            
            if (blocked) return;
            
            player.x = newX;
            player.y = newY;
            steps++;
            
            if (!visited[newY][newX]) {
                visited[newY][newX] = true;
            }
            path.push({ x: newX, y: newY });
            
            document.getElementById('steps').textContent = steps;
            playMoveSound();
            
            // 检查胜利
            if (player.x === exit.x && player.y === exit.y) {
                winGame();
            }
            
            draw();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': movePlayer(0, -1); break;
                case 'ArrowDown': case 's': case 'S': movePlayer(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': movePlayer(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': movePlayer(1, 0); break;
            }
        });
        
        function draw() {
            cellSize = canvas.width / mazeSize;
            
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制已访问区域
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    if (visited[y][x]) {
                        ctx.fillStyle = 'rgba(231, 76, 60, 0.1)';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // 绘制路径
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            path.forEach((pos, i) => {
                const cx = pos.x * cellSize + cellSize / 2;
                const cy = pos.y * cellSize + cellSize / 2;
                if (i === 0) ctx.moveTo(cx, cy);
                else ctx.lineTo(cx, cy);
            });
            ctx.stroke();
            
            // 绘制墙壁
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            
            for (let y = 0; y < mazeSize; y++) {
                for (let x = 0; x < mazeSize; x++) {
                    const cx = x * cellSize;
                    const cy = y * cellSize;
                    const cs = cellSize;
                    
                    ctx.beginPath();
                    if (maze[y][x].top) {
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(cx + cs, cy);
                    }
                    if (maze[y][x].right) {
                        ctx.moveTo(cx + cs, cy);
                        ctx.lineTo(cx + cs, cy + cs);
                    }
                    if (maze[y][x].bottom) {
                        ctx.moveTo(cx + cs, cy + cs);
                        ctx.lineTo(cx, cy + cs);
                    }
                    if (maze[y][x].left) {
                        ctx.moveTo(cx, cy + cs);
                        ctx.lineTo(cx, cy);
                    }
                    ctx.stroke();
                }
            }
            
            // 绘制外边框
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            // 绘制出口
            const exitX = exit.x * cellSize + cellSize / 2;
            const exitY = exit.y * cellSize + cellSize / 2;
            ctx.fillStyle = '#2ecc71';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#2ecc71';
            ctx.beginPath();
            ctx.arc(exitX, exitY, cellSize / 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // 出口标记
            ctx.fillStyle = '#fff';
            ctx.font = `${cellSize / 3}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏁', exitX, exitY);
            
            // 绘制玩家
            const px = player.x * cellSize + cellSize / 2;
            const py = player.y * cellSize + cellSize / 2;
            
            // 玩家光晕
            const gradient = ctx.createRadialGradient(px, py, 0, px, py, cellSize / 2);
            gradient.addColorStop(0, '#f1c40f');
            gradient.addColorStop(1, 'rgba(241, 196, 15, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(px, py, cellSize / 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 玩家图标
            ctx.fillStyle = '#fff';
            ctx.font = `${cellSize / 2}px Arial`;
            ctx.fillText('😊', px, py);
        }
        
        function updateTimer() {
            if (!gameRunning) return;
            gameTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = gameTime;
            requestAnimationFrame(updateTimer);
        }
        
        function startGame() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            gameRunning = true;
            level = 1;
            document.getElementById('level').textContent = level;
            startTime = Date.now();
            
            generateMaze();
            draw();
            playBackgroundMusic();
            updateTimer();
        }
        
        function winGame() {
            gameRunning = false;
            playWinSound();
            
            const optimalSteps = mazeSize * mazeSize / 2;
            let rating = 'C';
            if (steps <= optimalSteps * 1.2) rating = 'S';
            else if (steps <= optimalSteps * 1.5) rating = 'A';
            else if (steps <= optimalSteps * 2) rating = 'B';
            
            document.getElementById('finalTime').textContent = gameTime;
            document.getElementById('finalSteps').textContent = steps;
            document.getElementById('rating').textContent = rating;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function nextLevel() {
            document.getElementById('gameOver').style.display = 'none';
            level++;
            document.getElementById('level').textContent = level;
            steps = 0;
            document.getElementById('steps').textContent = steps;
            startTime = Date.now();
            gameRunning = true;
            generateMaze();
            draw();
            updateTimer();
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            steps = 0;
            document.getElementById('steps').textContent = steps;
            startTime = Date.now();
            gameRunning = true;
            generateMaze();
            draw();
            updateTimer();
        }
        
        function changeLevel() {
            mazeSize = parseInt(document.getElementById('levelSelect').value);
            canvas.width = Math.min(600, mazeSize * 30);
            canvas.height = canvas.width;
            startGame();
        }
        
        function toggleMusic() {
            musicEnabled = !musicEnabled;
        }
        
        // 初始绘制
        cellSize = canvas.width / mazeSize;
        generateMaze();
        draw();
    </script>
</body>
</html>
