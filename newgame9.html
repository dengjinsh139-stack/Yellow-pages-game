<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 记忆翻牌</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .ui {
            margin-bottom: 20px;
            font-size: 24px;
            color: #e94560;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            gap: 15px;
        }
        .card {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #0f3460, #16213e);
            border: 2px solid #e94560;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s;
            transform-style: preserve-3d;
        }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 20px #e94560; }
        .card.flipped { background: #e94560; transform: rotateY(180deg); }
        .card.matched { background: #4ecca3; border-color: #4ecca3; cursor: default; }
    </style>
</head>
<body>
    <div class="ui">翻牌次数: <span id="moves">0</span> | 时间: <span id="time">0</span>秒</div>
    <div class="grid" id="grid"></div>
    
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const icons = ['🎸','🎹','🥁','🎺','🎻','🎷','🎵','🎶'];
        let cards = [...icons, ...icons];
        let flipped = [];
        let matched = [];
        let moves = 0;
        let time = 0;
        let timer;
        
        function playBGM() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 200 + Math.sin(Date.now() / 1000) * 100;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
        
        function playFlip() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 400;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }
        
        function playMatch() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
        
        function shuffle(array) {
            for(let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function init() {
            cards = shuffle(cards);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards.forEach((icon, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = i;
                card.dataset.icon = icon;
                card.onclick = () => flip(card);
                grid.appendChild(card);
            });
            timer = setInterval(() => {
                time++;
                document.getElementById('time').textContent = time;
            }, 1000);
        }
        
        function flip(card) {
            if(flipped.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            card.textContent = card.dataset.icon;
            flipped.push(card);
            playFlip();
            
            if(flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                
                if(flipped[0].dataset.icon === flipped[1].dataset.icon) {
                    flipped.forEach(c => c.classList.add('matched'));
                    matched.push(...flipped);
                    playMatch();
                    flipped = [];
                    
                    if(matched.length === cards.length) {
                        clearInterval(timer);
                        setTimeout(() => alert(`🎉 恭喜完成！\n翻牌次数: ${moves}\n用时: ${time}秒`), 300);
                    }
                } else {
                    setTimeout(() => {
                        flipped.forEach(c => {
                            c.classList.remove('flipped');
                            c.textContent = '';
                        });
                        flipped = [];
                    }, 1000);
                }
            }
        }
        
        setInterval(playBGM, 500);
        if(audioCtx.state === 'suspended') document.addEventListener('click', ()=>audioCtx.resume(),{once:true});
        init();
    </script>
</body>
</html>
